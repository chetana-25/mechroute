<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechRoute | The Full Spectrum of Automotive Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #2563eb; --deep-slate: #0f172a; --soft-slate: #64748b; }
        body { background-color: #ffffff; color: var(--deep-slate); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 35px 8%; background: #ffffff; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; color: var(--deep-slate); text-decoration: none; }
        .logo span { color: var(--brand-blue); }
        .nav-link-signin { text-decoration: none; color: var(--deep-slate); font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px; padding: 12px 24px; border-radius: 14px; transition: all 0.3s ease; }
        .nav-link-signin:hover { color: var(--brand-blue); background-color: #f8fafc; }
        .hero { padding: 160px 8% 120px; text-align: center; background: radial-gradient(circle at 50% -20%, #eff6ff 0%, #ffffff 70%); }
        .hero h1 { font-size: 5.5rem; font-weight: 800; line-height: 1; letter-spacing: -4px; margin-bottom: 32px; }
        .hero h1 .highlight { background: linear-gradient(90deg, #2563eb, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.5rem; color: var(--soft-slate); max-width: 800px; margin: 0 auto 56px; line-height: 1.6; }
        .btn-elite { background: var(--deep-slate); color: white; padding: 22px 50px; border-radius: 18px; font-weight: 700; text-decoration: none; display: inline-block; font-size: 1.15rem; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-elite:hover { transform: translateY(-5px); background: var(--brand-blue); box-shadow: 0 20px 40px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Mech<span>Route.</span></a>
        <a href="pages/login.html" class="nav-link-signin">Sign In</a>
    </nav>
    <section class="hero">
        <span style="color: var(--brand-blue); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 24px; display: block;">Intelligent Fleet Infrastructure</span>
        <h1>The Full Spectrum <br>of <span class="highlight">Automotive Care.</span></h1>
        <p>From immediate roadside intervention to scheduled precision maintenance. MechRoute provides an elite infrastructure for every mile.</p>
        <a href="pages/register.html" class="btn-elite">Start Your Journey</a>
    </section>
</body>
</html>
