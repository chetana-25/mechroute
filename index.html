<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechRoute | Precision Fleet Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #2563eb;
            --slate: #0f172a;
            --soft-slate: #64748b;
            --bg: #fcfdfe;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--slate);
            line-height: 1.6;
        }

        /* --- NAVIGATION / LOGO AREA --- */
        nav {
            padding: 40px 8%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .logo {
            font-size: 3.5rem; /* Massive & Bold */
            font-weight: 800;
            letter-spacing: -3.5px; /* Tight, premium kerning */
            color: var(--slate);
            text-decoration: none;
            transition: 0.3s;
        }

        .logo span {
            color: var(--brand);
        }

        .logo:hover {
            transform: scale(0.98);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 80px 8% 120px;
            max-width: 1200px;
        }

        .hero h1 {
            font-size: 5.5rem; /* Large Headline */
            line-height: 0.95;
            letter-spacing: -5px;
            margin: 0 0 30px 0;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.4rem;
            color: var(--soft-slate);
            max-width: 600px;
            margin-bottom: 50px;
            font-weight: 500;
        }

        /* --- ACTION BUTTON --- */
        .cta-container {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-primary {
            background-color: var(--slate);
            color: white;
            padding: 24px 48px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
        }

        .btn-primary:hover {
            background-color: var(--brand);
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(37, 99, 235, 0.2);
        }

        /* --- SUBTLE DECORATION --- */
        .badge-new {
            display: inline-block;
            background: #eff6ff;
            color: var(--brand);
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; letter-spacing: -2px; }
            .logo { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">MechRoute<span>.</span></a>
    </nav>

    <main class="hero">
        <span class="badge-new">Now Live in India</span>
        <h1>The New Standard <br> in Fleet Care.</h1>
        <p>
            Experience a digital-first approach to vehicle maintenance. Proactive, transparent, and built for the elite driver.
        </p>

        <div class="cta-container">
            <a href="pages/dashboard.html" class="btn-primary">Enter Command Centre</a>
        </div>
    </main>

</body>
</html>
