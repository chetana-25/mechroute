<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechRoute | Portal Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- MECHROUTE SHARED DESIGN SYSTEM --- */
        :root {
            --brand: #2563eb;
            --brand-gradient: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            --dark: #0f172a;
            --text-muted: #64748b;
            --border: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 60px;
            color: var(--dark);
        }

        .logo span { color: var(--brand); }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-section h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--dark);
            letter-spacing: -0.04em;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 12px;
        }

        .gateway-grid {
            display: flex;
            gap: 24px;
            width: 90%;
            max-width: 900px;
        }

        .role-card {
            flex: 1;
            padding: 48px 32px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 28px;
            text-align: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .role-card:hover {
            transform: translateY(-10px);
            border-color: var(--brand);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #f8fafc;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 24px;
            transition: 0.3s;
        }

        .role-card:hover .icon-circle {
            background: var(--brand);
            color: white;
        }

        .role-card h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .role-card p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .btn-elite {
            padding: 12px 24px;
            background: var(--dark);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            width: 100%;
            transition: 0.3s;
        }

        .role-card:hover .btn-elite {
            background: var(--brand);
            transform: scale(1.02);
        }

        /* Logic for Driver specific Card */
        .driver-card:hover .btn-elite {
            background: var(--brand-gradient);
        }
    </style>
</head>
<body>

    <div class="logo">MechRoute<span>.</span></div>

    <div class="header-section">
        <h1>Welcome to the Fleet</h1>
        <p>Identify your role to access the correct terminal.</p>
    </div>

    <div class="gateway-grid">
        
        <a href="driver_home.html" class="role-card driver-card" onclick="saveRole('driver')">
            <div class="icon-circle">🚘</div>
            <h2>Vehicle Owner</h2>
            <p>Monitor real-time engine health, track spending, and book services.</p>
            <div class="btn-elite">Enter Driver Portal</div>
        </a>

        <a href="mechanic_home.html" class="role-card" onclick="saveRole('mechanic')">
            <div class="icon-circle">🔧</div>
            <h2>Service Pro</h2>
            <p>Access the technician workstation to manage fleet repairs and logs.</p>
            <div class="btn-elite">Staff Login</div>
        </a>

    </div>

    <script>
        function saveRole(role) {
            // Stores the role in memory so other pages can adapt
            localStorage.setItem('active_role', role);
        }
    </script>

</body>
</html>
