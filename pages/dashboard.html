<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --slate: #0f172a; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--slate); }

        /* --- TOP NAVIGATION BAR --- */
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 8%; 
            background: white; 
            border-bottom: 1px solid #e2e8f0;
        }

        /* BIGGER LOGO */
        .logo { 
            font-size: 3rem; /* Extra Bold & Large */
            font-weight: 800; 
            letter-spacing: -3px; 
            text-decoration: none; 
            color: var(--slate);
        }
        .logo span { color: var(--brand); }

        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-links a { text-decoration: none; color: #64748b; font-weight: 700; font-size: 0.95rem; }
        
        /* SIGN IN BUTTON */
        .btn-signin { 
            background: var(--slate); 
            color: white; 
            padding: 12px 28px; 
            border-radius: 100px; 
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-signin:hover { background: var(--brand); }

        /* --- DASHBOARD LAYOUT --- */
        .wrapper { display: flex; min-height: calc(100vh - 90px); }
        
        /* SIDEBAR */
        .sidebar { 
            width: 260px; 
            background: white; 
            border-right: 1px solid #e2e8f0; 
            padding: 40px 20px;
        }
        .side-item { 
            padding: 16px 20px; 
            border-radius: 14px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            color: #64748b; 
            font-weight: 700; 
            transition: 0.2s;
        }
        .side-item:hover, .side-item.active { background: #eff6ff; color: var(--brand); }

        /* MAIN CONTENT */
        .content { flex: 1; padding: 50px 8%; }
        .view { display: none; }
        .view.active { display: block; }

        .welcome-msg { margin-bottom: 40px; }
        .welcome-msg h1 { font-size: 2.5rem; letter-spacing: -2px; margin: 0; }
        .user-id { color: var(--brand); font-weight: 700; font-size: 0.9rem; margin-top: 8px; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; }
        .stat-card label { font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h3 { margin: 12px 0 0; font-size: 2rem; letter-spacing: -1px; }

        /* HISTORY TABLE */
        .card { background: white; border-radius: 28px; padding: 30px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 22px 15px; border-bottom: 1px solid #f1f5f9; font-size: 1rem; }
        .pill { background: #dcfce7; color: #166534; padding: 6px 14px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="../index.html" class="logo">MechRoute<span>.</span></a>
        <nav class="nav-links">
            <a href="#">Fleet</a>
            <a href="#">Network</a>
            <a href="#">Security</a>
            <a href="#" class="btn-signin">Sign In</a>
        </nav>
    </header>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="side-item active" onclick="showSection('overview', this)">Overview</div>
            <div class="side-item" onclick="showSection('history', this)">Service History</div>
            <a href="booking.html" style="text-decoration:none;"><div class="side-item" style="color:var(--brand);">+ Book Service</div></a>
        </aside>

        <main class="content">
            <div class="welcome-msg">
                <h1>Welcome back, Admin</h1>
                <div class="user-id">ID: admin.fleet@mechroute.com</div>
            </div>

            <section id="overview" class="view active">
                <div class="stats-grid">
                    <div class="stat-card"><label>Fleet Health</label><h3 style="color:#16a34a;">Operational</h3></div>
                    <div class="stat-card"><label>Active Logs</label><h3 id="statCount">0</h3></div>
                    <div class="stat-card"><label>Proactive Score</label><h3>98%</h3></div>
                </div>
            </section>

            <section id="history" class="view">
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Date</th><th>Service</th><th>Amount</th><th>Status</th></tr>
                        </thead>
                        <tbody id="logBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Toggle Sections
        function showSection(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.side-item').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        // Initialize Data
        window.onload = function() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            document.getElementById('statCount').innerText = logs.length;
            
            const tbody = document.getElementById('logBody');
            if(logs.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:50px; color:#94a3b8;'>No service records found.</td></tr>";
            } else {
                [...logs].reverse().forEach(log => {
                    tbody.innerHTML += `<tr>
                        <td style="font-weight:700; color:#64748b;">${log.date}</td>
                        <td style="font-weight:700;">${log.service}</td>
                        <td style="color:var(--brand); font-weight:800;">${log.price}</td>
                        <td><span class="pill">VERIFIED</span></td>
                    </tr>`;
                });
            }
        };
    </script>
</body>
</html>
