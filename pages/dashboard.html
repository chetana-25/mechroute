<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav>
        <a href="../index.html" class="logo">MechRoute</a>
        <div id="user-id" style="color: var(--brand); font-weight: 700;">Driver</div>
    </nav>
    <div class="container">
        <header style="margin-top: 2rem;">
            <h1>Welcome Back</h1>
            <p id="active-email" style="color: var(--text-muted);"></p>
        </header>
        <div class="grid" style="margin-top: 3rem;">
            <div class="card" style="border-left: 5px solid var(--danger);">
                <h3>Emergency Help</h3>
                <p>Find a mechanic nearby instantly.</p>
                <a href="service.html" class="btn btn-primary" style="display: block; margin-top: 1rem; text-align: center;">Request Now</a>
            </div>
        </div>
    </div>
    <script>
        const email = sessionStorage.getItem('mechEmail');
        if(email) {
            document.getElementById('active-email').innerText = "Logged in as: " + email;
            document.getElementById('user-id').innerText = email.split('@')[0];
        }
    </script>
</body>
</html>
