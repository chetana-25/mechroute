<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --slate: #0f172a; --bg: #f8fafc; }
        body { margin: 0; display: flex; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); height: 100vh; }
        
        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: var(--slate); color: white; padding: 40px 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 1.5rem; letter-spacing: -1px; margin-bottom: 50px; padding-left: 15px; }
        .nav-item { color: #94a3b8; text-decoration: none; padding: 15px; border-radius: 12px; margin-bottom: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 60px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* STATS VIEW */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: white; padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; }
        
        /* HISTORY VIEW */
        .history-card { background: white; border-radius: 24px; padding: 30px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #94a3b8; font-size: 0.75rem; padding: 15px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 20px 15px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>MechRoute.</h2>
        <div class="nav-item active" onclick="showView('overview', this)">Overview</div>
        <div class="nav-item" onclick="showView('history', this)">Service History</div>
        <a href="booking.html" class="nav-item" style="margin-top: auto; background: var(--brand); color: white; text-align: center;">+ Book Service</a>
    </div>

    <div class="main-content">
        
        <div id="overview" class="view-section active">
            <h1>Vehicle Overview</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>94%</h3><p>Engine Health</p></div>
                <div class="stat-card"><h3 id="statCount">0</h3><p>Total Services</p></div>
                <div class="stat-card"><h3>₹0</h3><p>Total Spent</p></div>
            </div>
        </div>

        <div id="history" class="view-section">
            <h1>Service Ledger</h1>
            <div class="history-card">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Service</th><th>Amount</th><th>Status</th></tr>
                    </thead>
                    <tbody id="logBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function showView(viewId, element) {
            // Toggle Views
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');

            // Toggle Sidebar Active State
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }

        window.onload = function() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            document.getElementById('statCount').innerText = logs.length;

            const tbody = document.getElementById('logBody');
            if(logs.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:40px;'>No history found.</td></tr>";
                return;
            }

            logs.reverse().forEach(log => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:700;">${log.date}</td>
                        <td>${log.service}</td>
                        <td style="color:var(--brand); font-weight:800;">${log.price}</td>
                        <td><span style="background:#dcfce7; color:#166534; padding:5px 10px; border-radius:8px; font-size:0.7rem; font-weight:800;">VERIFIED</span></td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
