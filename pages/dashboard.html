<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --deep-slate: #0f172a;
            --soft-slate: #64748b;
            --bg-light: #fcfdfe;
        }

        body {
            background-color: var(--bg-light);
            color: var(--deep-slate);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 5%;
        }

        .dashboard-container { max-width: 1000px; margin: 0 auto; }

        /* --- HEADER SECTION --- */
        .db-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
        }
        .db-header h1 { font-size: 2.2rem; letter-spacing: -1.5px; margin: 0; }
        .user-badge { background: white; padding: 10px 20px; border-radius: 100px; border: 1px solid #f1f5f9; font-weight: 700; font-size: 0.9rem; }

        /* --- STAT CARDS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
        }
        .stat-card label { color: var(--soft-slate); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0; font-size: 1.8rem; letter-spacing: -1px; }

        /* --- THE DYNAMIC SERVICE LEDGER --- */
        .ledger-box {
            background: white;
            padding: 35px;
            border-radius: 32px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .ledger-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .ledger-header h3 { margin: 0; font-size: 1.4rem; letter-spacing: -1px; }
        .btn-book {
            text-decoration: none;
            background: var(--brand-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-book:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--soft-slate); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; padding: 15px 10px; border-bottom: 2px solid #f8fafc; }
        td { padding: 20px 10px; border-bottom: 1px solid #f8fafc; font-size: 0.95rem; }
        
        .status-verified {
            background: #f0fdf4;
            color: #166534;
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            border: 1px solid #dcfce7;
        }

        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="db-header">
            <h1>Fleet Dashboard</h1>
            <div class="user-badge" id="userDisplay">Admin User</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <label>Vehicle Health</label>
                <h2 style="color: #16a34a;">94%</h2>
            </div>
            <div class="stat-card">
                <label>Total Services</label>
                <h2 id="totalServiceCount">0</h2>
            </div>
            <div class="stat-card">
                <label>Next Maintenance</label>
                <h2 id="nextServiceDate">TBD</h2>
            </div>
        </div>

        <div class="ledger-box">
            <div class="ledger-header">
                <h3>Vehicle Service Ledger</h3>
                <a href="booking.html" class="btn-book">+ New Booking</a>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Service Description</th>
                        <th>Amount Paid</th>
                        <th style="text-align: right;">Status</th>
                    </tr>
                </thead>
                <tbody id="dashboardLogBody">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        window.addEventListener('load', function() {
            const logBody = document.getElementById('dashboardLogBody');
            const serviceCountDisplay = document.getElementById('totalServiceCount');
            const nextServiceDisplay = document.getElementById('nextServiceDate');
            
            // 1. Get logs from LocalStorage (saved in checkout.html)
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];

            // 2. Update the "Total Services" Stat
            serviceCountDisplay.innerText = logs.length;

            // 3. Handle Empty State
            if (logs.length === 0) {
                logBody.innerHTML = `
                    <tr>
                        <td colspan="4" style="padding: 60px 0; text-align: center; color: #94a3b8;">
                            <strong>No maintenance records yet.</strong><br>
                            <span style="font-size: 0.85rem;">Book a service to start your digital ledger.</span>
                        </td>
                    </tr>`;
                return;
            }

            // 4. Update "Next Maintenance" (Simple Logic: Show the most recent date)
            nextServiceDisplay.innerText = logs[logs.length - 1].date;

            // 5. Render the most recent 3 entries
            logBody.innerHTML = '';
            const recentEntries = [...logs].reverse().slice(0, 3);

            recentEntries.forEach(entry => {
                const row = `
                    <tr>
                        <td style="color: var(--soft-slate); font-weight: 600;">${entry.date}</td>
                        <td style="font-weight: 700; color: var(--deep-slate);">${entry.service}</td>
                        <td style="font-weight: 800; color: var(--deep-slate);">${entry.price}</td>
                        <td style="text-align: right;">
                            <span class="status-verified">VERIFIED</span>
                        </td>
                    </tr>
                `;
                logBody.innerHTML += row;
            });
        });
    </script>

</body>
</html>
