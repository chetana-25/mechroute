<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --sidebar-bg: #0f172a;
            --main-bg: #ffffff;
            --text-slate: #0f172a;
            --soft-slate: #64748b;
            --border-light: #f1f5f9;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 50px 30px;
            justify-content: space-between;
        }

        .logo { 
            font-size: 2.2rem; 
            font-weight: 800; 
            letter-spacing: -1.5px;
            margin-bottom: 60px;
        }

        .nav-menu { flex-grow: 1; }
        
        .nav-item {
            padding: 18px 24px;
            border-radius: 14px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 700;
            display: block;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .nav-item.active { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
        }

        .nav-item:hover:not(.active) { 
            color: white; 
            background: rgba(255, 255, 255, 0.05); 
        }

        .btn-book {
            background: var(--brand-blue);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }

        .btn-book:hover {
            transform: translateY(-3px);
            background: #1d4ed8;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            padding: 80px 100px;
            overflow-y: auto;
        }

        /* WELCOME & ID SECTION */
        .welcome-section {
            margin-bottom: 60px;
        }

        .welcome-section h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0;
            color: var(--text-slate);
        }

        .id-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .fleet-badge {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--brand-blue);
            background: #eff6ff;
            padding: 8px 16px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #10b981; /* Success Green */
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
        }

        /* STAT CARDS */
        .stats-grid {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-card {
            flex: 1;
            padding: 45px;
            border-radius: 36px;
            border: 1px solid var(--border-light);
            background: #ffffff;
            transition: all 0.4s ease;
        }

        .stat-card:hover {
            border-color: var(--brand-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }

        .stat-card h2 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0;
            color: var(--text-slate);
        }

        .stat-card p {
            color: var(--soft-slate);
            font-weight: 600;
            font-size: 1.2rem;
            margin-top: 12px;
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="logo">MechRoute.</div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">Overview</a>
                <a href="history.html" class="nav-item">Service History</a>
            </nav>
        </div>
        <a href="booking.html" class="btn-book">+ Book Service</a>
    </aside>

    <main class="main-content">
        <header class="welcome-section">
            <h1 id="userNameDisplay">Welcome back, Scout</h1>
            <div class="id-container">
                <div class="fleet-badge">Fleet ID: <span id="fleetID">MR-LOAD-01</span></div>
                <div class="status-dot"><span class="dot"></span> Online</div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h2>94%</h2>
                <p>Engine Health</p>
            </div>
            <div class="stat-card">
                <h2 id="serviceCount">2</h2>
                <p>Total Services</p>
            </div>
            <div class="stat-card">
                <h2>₹0</h2>
                <p>Total Spent</p>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            // 1. Fetch User Name from LocalStorage (saved during registration)
            // Default to 'Scout' if not found
            const savedName = localStorage.getItem('user_name') || 'Scout';
            document.getElementById('userNameDisplay').innerText = `Welcome back, ${savedName}`;

            // 2. Handle Unique Fleet ID
            let savedID = localStorage.getItem('fleet_id');
            if (!savedID) {
                // Generate a random 5-digit number
                const randomNum = Math.floor(10000 + Math.random() * 90000);
                savedID = `MR-${randomNum}`;
                localStorage.setItem('fleet_id', savedID);
            }
            document.getElementById('fleetID').innerText = savedID;

            // 3. Dynamic Service Count
            // Assuming you store history in an array called 'service_history'
            const history = JSON.parse(localStorage.getItem('service_history')) || [];
            if(history.length > 0) {
                document.getElementById('serviceCount').innerText = history.length;
            }
        };
    </script>
</body>
</html>
