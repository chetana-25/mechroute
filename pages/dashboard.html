<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --slate: #0f172a; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--slate); }

        /* --- TOP NAVBAR --- */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; background: white; border-bottom: 1px solid #e2e8f0;
        }

        .logo { 
            font-size: 3.5rem; font-weight: 800; letter-spacing: -3.5px; 
            text-decoration: none; color: var(--slate); 
        }
        .logo span { color: var(--brand); }

        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-links a { text-decoration: none; color: #64748b; font-weight: 700; font-size: 0.95rem; }
        .btn-signin { background: var(--slate); color: white; padding: 12px 28px; border-radius: 100px; text-decoration: none; }

        /* --- ORIGINAL DASHBOARD CONTENT --- */
        .container { max-width: 1100px; margin: 50px auto; padding: 0 5%; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 45px; }
        .header-row h1 { font-size: 2.5rem; letter-spacing: -2px; margin: 0; }

        .btn-book { 
            background: var(--brand); color: white; padding: 14px 28px; 
            border-radius: 16px; text-decoration: none; font-weight: 800; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.1);
        }

        /* ORIGINAL 3-CARD GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 50px; }
        .stat-card { background: white; padding: 35px; border-radius: 28px; border: 1px solid #e2e8f0; }
        .stat-card label { font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h3 { margin: 15px 0 0; font-size: 2.2rem; letter-spacing: -1px; }

        /* ORIGINAL FULL-WIDTH LEDGER */
        .ledger-box { background: white; border-radius: 32px; padding: 40px; border: 1px solid #e2e8f0; }
        .ledger-box h3 { margin: 0 0 30px 0; font-size: 1.5rem; letter-spacing: -1px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #f8fafc; }
        td { padding: 25px 15px; border-bottom: 1px solid #f8fafc; font-size: 1rem; }
        
        .status-pill { background: #dcfce7; color: #166534; padding: 6px 14px; border-radius: 100px; font-size: 0.75rem; font-weight: 800; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">MechRoute<span>.</span></a>
        <div class="nav-links">
            <a href="#">Fleet</a>
            <a href="#">Services</a>
            <a href="#">Support</a>
            <a href="#" class="btn-signin">Sign In</a>
        </div>
    </nav>

    <div class="container">
        <header class="header-row">
            <h1>Fleet Dashboard</h1>
            <a href="booking.html" class="btn-book">+ New Booking</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><label>System Health</label><h3 style="color:#16a34a;">Operational</h3></div>
            <div class="stat-card"><label>Total Services</label><h3 id="statCount">0</h3></div>
            <div class="stat-card"><label>Proactive Score</label><h3>98/100</h3></div>
        </div>

        <div class="ledger-box">
            <h3>Service History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Service Description</th>
                        <th>Amount Paid</th>
                        <th style="text-align: right;">Status</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        window.onload = function() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            document.getElementById('statCount').innerText = logs.length;
            const tbody = document.getElementById('logBody');
            
            if(logs.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:60px; color:#94a3b8;'>No maintenance history recorded.</td></tr>";
            } else {
                [...logs].reverse().forEach(log => {
                    tbody.innerHTML += `<tr>
                        <td style="font-weight:600; color:#64748b;">${log.date}</td>
                        <td style="font-weight:700;">${log.service}</td>
                        <td style="font-weight:800; color:var(--brand);">${log.price}</td>
                        <td style="text-align: right;"><span class="status-pill">VERIFIED</span></td>
                    </tr>`;
                });
            }
        };
    </script>
</body>
</html>
