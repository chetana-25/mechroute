<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #2563eb; --sidebar-bg: #0f172a; --text-slate: #0f172a; --soft-slate: #64748b; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; overflow: hidden; }
        .sidebar { width: 280px; background-color: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 40px 24px; justify-content: space-between; }
        .main-content { flex-grow: 1; padding: 60px 80px; overflow-y: auto; }
        .welcome-text { font-size: 2.2rem; font-weight: 700; margin: 0; color: var(--text-slate); }
        .fleet-badge { font-size: 0.75rem; font-weight: 800; color: var(--brand-blue); background: #eff6ff; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .fleet-email { font-size: 0.9rem; font-weight: 600; color: var(--soft-slate); }
        .stats-grid { display: flex; gap: 24px; margin-top: 30px; }
        .stat-card { flex: 1; padding: 40px; border-radius: 28px; border: 1px solid #f1f5f9; background: #ffffff; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" style="font-size: 2rem; font-weight: 800;">MechRoute.</div>
        <nav style="flex-grow: 1; margin-top: 50px;">
            <a href="dashboard.html" style="display:block; color:white; text-decoration:none; margin-bottom:15px; font-weight:700;">Overview</a>
            <a href="logs.html" style="display:block; color:#94a3b8; text-decoration:none; font-weight:700;">Service History</a>
        </nav>
        <a href="booking.html" style="background:var(--brand-blue); color:white; padding:15px; text-align:center; border-radius:12px; text-decoration:none; font-weight:800;">+ Book Service</a>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="userNameDisplay" class="welcome-text">Welcome</h1>
            <div style="margin-top: 10px;">
                <span class="fleet-badge">Fleet ID</span>
                <span id="fleetEmailDisplay" class="fleet-email">loading...</span>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card"><h2>94%</h2><p>Engine Health</p></div>
            <div class="stat-card"><h2 id="totalServicesCount">0</h2><p>Total Services</p></div>
            <div class="stat-card"><h2 id="totalSpentDisplay">₹0</h2><p>Total Spent</p></div>
        </section>
        
        <button onclick="logout()" style="margin-top: 40px; padding: 10px 20px; border: none; background: #f1f5f9; color: #e11d48; border-radius: 8px; font-weight: 700; cursor: pointer;">Logout</button>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DYNAMIC UPDATE: Pulling data from the person who just logged in
            const firstName = localStorage.getItem('user_firstName') || "User";
            const fleetEmail = localStorage.getItem('user_email') || "not registered";

            document.getElementById('userNameDisplay').innerText = `Welcome, ${firstName}`;
            document.getElementById('fleetEmailDisplay').innerText = fleetEmail;

            // Load Services Data
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            document.getElementById('totalServicesCount').innerText = logs.length;

            let total = 0;
            logs.forEach(entry => {
                const price = parseInt(entry.price.replace('₹', ''));
                total += price;
            });
            document.getElementById('totalSpentDisplay').innerText = `₹${total}`;
        });

        function logout() {
            // Optional: clear session but keep user database
            localStorage.removeItem('user_firstName');
            localStorage.removeItem('user_email');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
