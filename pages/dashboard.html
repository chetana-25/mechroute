<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --deep-slate: #0f172a;
            --soft-slate: #64748b;
            --bg-light: #fcfdfe;
        }

        body {
            background-color: var(--bg-light);
            color: var(--deep-slate);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- ORIGINAL TOP NAVBAR --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: white;
            border-bottom: 1px solid #f1f5f9;
        }

        /* THE ONLY CHANGE: BIGGER LOGO */
        .logo {
            font-size: 3.2rem; 
            font-weight: 800;
            letter-spacing: -3px;
            text-decoration: none;
            color: var(--deep-slate);
        }
        .logo span { color: var(--brand-blue); }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--soft-slate); font-weight: 700; font-size: 0.9rem; }
        
        .btn-signin {
            background: var(--deep-slate);
            color: white;
            padding: 12px 28px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        /* --- DASHBOARD CONTENT --- */
        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 0 5%; }

        .db-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
        }
        .db-header h1 { font-size: 2.2rem; letter-spacing: -1.5px; margin: 0; }
        .user-id { color: var(--brand-blue); font-weight: 700; font-size: 0.9rem; }

        /* STAT CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
        }
        .stat-card label { color: var(--soft-slate); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .stat-card h3 { margin: 10px 0 0; font-size: 1.8rem; letter-spacing: -1px; }

        /* SERVICE LEDGER (Original Table) */
        .ledger-box {
            background: white;
            padding: 35px;
            border-radius: 32px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .ledger-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .ledger-header h3 { margin: 0; font-size: 1.4rem; letter-spacing: -1px; }

        .btn-book {
            text-decoration: none;
            background: var(--brand-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--soft-slate); font-size: 0.7rem; text-transform: uppercase; padding: 15px 10px; border-bottom: 2px solid #f8fafc; }
        td { padding: 20px 10px; border-bottom: 1px solid #f8fafc; font-size: 0.95rem; }
        
        .status-pill {
            background: #dcfce7;
            color: #166534;
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">MechRoute<span>.</span></a>
        <div class="nav-links">
            <a href="#">Fleet</a>
            <a href="#">Services</a>
            <a href="#">Support</a>
            <a href="#" class="btn-signin">Sign In</a>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <header class="db-header">
            <div>
                <h1>Welcome back, Admin</h1>
                <div class="user-id">ID: admin.fleet@mechroute.com</div>
            </div>
            <a href="booking.html" class="btn-book">+ New Booking</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <label>System Health</label>
                <h3 style="color: #16a34a;">Operational</h3>
            </div>
            <div class="stat-card">
                <label>Total Services</label>
                <h3 id="statCount">0</h3>
            </div>
            <div class="stat-card">
                <label>Proactive Score</label>
                <h3>98%</h3>
            </div>
        </div>

        <div class="ledger-box">
            <div class="ledger-header">
                <h3>Vehicle Service History</h3>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Service Description</th>
                        <th>Amount Paid</th>
                        <th style="text-align: right;">Status</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        window.onload = function() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            document.getElementById('statCount').innerText = logs.length;

            const tbody = document.getElementById('logBody');
            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:50px; color:#94a3b8;">No maintenance history found.</td></tr>`;
                return;
            }

            [...logs].reverse().forEach(log => {
                tbody.innerHTML += `
                    <tr>
                        <td style="color: var(--soft-slate); font-weight: 600;">${log.date}</td>
                        <td style="font-weight: 700;">${log.service}</td>
                        <td style="font-weight: 800; color: var(--brand-blue);">${log.price}</td>
                        <td style="text-align: right;">
                            <span class="status-pill">VERIFIED</span>
                        </td>
                    </tr>
                `;
            });
        };
    </script>

</body>
</html>
