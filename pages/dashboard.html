<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand: #2563eb; 
            --slate: #0f172a; 
            --bg: #f8fafc; 
            --light-green: #dcfce7;
            --success-green: #166534;
        }

        body { 
            margin: 0; 
            display: flex; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 280px; 
            background: var(--slate); 
            color: white; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
        }

        .sidebar h2 { 
            font-size: 1.8rem; 
            letter-spacing: -2px; 
            margin-bottom: 50px; 
            padding-left: 15px; 
        }
        
        .sidebar h2 span { color: var(--brand); }

        .nav-item { 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 16px 20px; 
            border-radius: 14px; 
            margin-bottom: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-item:hover, .nav-item.active { 
            background: rgba(255,255,255,0.1); 
            color: white; 
        }

        .btn-book-nav {
            margin-top: auto;
            background: var(--brand);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            transition: 0.3s;
        }

        /* --- MAIN CONTENT --- */
        .main-content { 
            flex: 1; 
            padding: 60px 8%; 
            overflow-y: auto; 
        }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- WELCOME HEADER --- */
        .welcome-box {
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid #e2e8f0;
        }

        .welcome-box h1 { 
            font-size: 2.8rem; 
            letter-spacing: -2.5px; 
            margin: 0; 
            color: var(--slate);
        }

        .user-id-strip { 
            margin-top: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--brand);
        }

        /* --- STATS GRID --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }

        .stat-card { 
            background: white; 
            padding: 30px; 
            border-radius: 28px; 
            border: 1px solid #e2e8f0; 
        }

        .stat-card label { color: #94a3b8; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h3 { margin: 12px 0 0; font-size: 2rem; letter-spacing: -1px; }

        /* --- TABLE STYLE --- */
        .history-card { 
            background: white; 
            border-radius: 32px; 
            padding: 35px; 
            border: 1px solid #e2e8f0; 
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; padding: 15px 20px; border-bottom: 2px solid #f8fafc; }
        td { padding: 25px 20px; border-bottom: 1px solid #f8fafc; font-size: 1rem; }

        .status-badge { 
            background: var(--light-green); 
            color: var(--success-green); 
            padding: 6px 14px; 
            border-radius: 100px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            border: 1px solid #dcfce7;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>MechRoute<span>.</span></h2>
        <div class="nav-item active" onclick="showView('overview', this)">Overview</div>
        <div class="nav-item" onclick="showView('history', this)">Service History</div>
        
        <a href="booking.html" class="btn-book-nav">+ Book Service</a>
    </nav>

    <main class="main-content">
        
        <header class="welcome-box">
            <h1>Welcome back, Fleet Manager</h1>
            <div class="user-id-strip">
                ID: <span id="displayEmail">user.fleet@mechroute.com</span>
            </div>
        </header>

        <section id="overview" class="view-section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <label>System Status</label>
                    <h3 style="color: #16a34a;">Operational</h3>
                </div>
                <div class="stat-card">
                    <label>Fleet Records</label>
                    <h3 id="statCount">0</h3>
                </div>
                <div class="stat-card">
                    <label>Proactive Score</label>
                    <h3>94/100</h3>
                </div>
            </div>
        </section>

        <section id="history" class="view-section">
            <div class="history-card">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Service Description</th>
                            <th>Amount Paid</th>
                            <th style="text-align: right;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logBody">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        // Switch between Overview and History
        function showView(viewId, element) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }

        // Initialize Data
        window.addEventListener('load', function() {
            // 1. Generate Email ID
            const userName = "User"; // Can be dynamic
            document.getElementById('displayEmail').innerText = userName.toLowerCase() + ".fleet@mechroute.com";

            // 2. Fetch Logs
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            document.getElementById('statCount').innerText = logs.length;

            const tbody = document.getElementById('logBody');
            if(logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:50px; color:#94a3b8;">Your service records will appear here after your first booking.</td></tr>`;
                return;
            }

            // Render Rows (Newest first)
            [...logs].reverse().forEach(log => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:600; color:#64748b;">${log.date}</td>
                        <td style="font-weight:700; color:var(--slate);">${log.service}</td>
                        <td style="font-weight:800; color:var(--slate);">${log.price}</td>
                        <td style="text-align: right;">
                            <span class="status-badge">VERIFIED</span>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
