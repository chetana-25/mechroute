<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --sidebar-bg: #0f172a;
            --main-bg: #ffffff;
            --text-slate: #0f172a;
            --soft-slate: #64748b;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            justify-content: space-between;
        }

        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 50px; }
        .nav-menu { flex-grow: 1; }
        
        .nav-item {
            padding: 16px 20px;
            border-radius: 12px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }

        .btn-book {
            background: var(--brand-blue);
            color: white;
            padding: 18px;
            border-radius: 14px;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        /* --- CONTENT --- */
        .main-content {
            flex-grow: 1;
            padding: 60px 80px;
            overflow-y: auto;
        }

        .welcome-header { margin-bottom: 40px; }
        .welcome-header h1 { 
            font-size: 3.5rem; 
            font-weight: 800; 
            margin: 0; 
            letter-spacing: -2px; 
            color: var(--text-slate); 
        }

        .badge-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .fleet-badge {
            background: #eff6ff;
            color: var(--brand-blue);
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .status-online {
            color: #10b981;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; }

        /* CARDS */
        .stats-grid {
            display: flex;
            gap: 24px;
            margin-top: 40px;
        }

        .stat-card {
            flex: 1;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #f1f5f9;
            text-align: left;
        }

        .stat-card h2 { font-size: 3rem; margin: 0; font-weight: 800; }
        .stat-card p { color: var(--soft-slate); font-weight: 600; margin-top: 10px; font-size: 1.1rem; }

        .border-blue { border: 2px solid var(--brand-blue); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="logo">MechRoute.</div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">Overview</a>
                <a href="#" class="nav-item">Service History</a>
            </nav>
        </div>
        <a href="#" class="btn-book">+ Book Service</a>
    </aside>

    <main class="main-content">
        <header class="welcome-header">
            <h1 id="display-name">Welcome back, Scout</h1>
            
            <div class="badge-row">
                <div class="fleet-badge">FLEET ID: <span id="display-id">EXTRACTING...</span></div>
                <div class="status-online"><span class="dot"></span> Online</div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card border-blue">
                <h2>94%</h2>
                <p>Engine Health</p>
            </div>
            <div class="stat-card">
                <h2>2</h2>
                <p>Total Services</p>
            </div>
            <div class="stat-card">
                <h2>₹0</h2>
                <p>Total Spent</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. EXTRACT THE NAME
            // We look for 'user_name' which you saved during registration
            const registeredName = localStorage.getItem('user_name');
            
            if (registeredName) {
                document.getElementById('display-name').innerText = `Welcome back, ${registeredName}`;
            }

            // 2. EXTRACT OR GENERATE FLEET ID
            // We check if this specific user already has an ID. If not, we make one.
            let fleetID = localStorage.getItem('user_fleet_id');
            
            if (!fleetID) {
                // Generates a professional ID: MR + 5 random numbers
                const randomPart = Math.floor(10000 + Math.random() * 90000);
                fleetID = `MR-${randomPart}`;
                localStorage.setItem('user_fleet_id', fleetID);
            }
            
            document.getElementById('display-id').innerText = fleetID;
        });
    </script>
</body>
</html>
