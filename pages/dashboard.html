<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand: #2563eb; 
            --slate: #0f172a; 
            --bg: #f8fafc; 
            --light-green: #dcfce7;
            --success-green: #166534;
        }

        body { 
            margin: 0; 
            display: flex; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar { 
            width: 280px; 
            background: var(--slate); 
            color: white; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar h2 { 
            font-size: 1.6rem; 
            letter-spacing: -1.5px; 
            margin-bottom: 50px; 
            padding-left: 15px; 
            color: white;
        }

        .nav-item { 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 16px 20px; 
            border-radius: 14px; 
            margin-bottom: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-item:hover, .nav-item.active { 
            background: rgba(255,255,255,0.1); 
            color: white; 
        }

        .btn-book-nav {
            margin-top: auto;
            background: var(--brand);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            transition: 0.3s;
        }

        .btn-book-nav:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }

        /* --- MAIN CONTENT AREA --- */
        .main-content { 
            flex: 1; 
            padding: 60px; 
            overflow-y: auto; 
        }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.2rem; letter-spacing: -1.5px; margin-bottom: 30px; }

        /* --- OVERVIEW: STAT CARDS --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }

        .stat-card { 
            background: white; 
            padding: 30px; 
            border-radius: 28px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
        }

        .stat-card label { color: #64748b; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h3 { margin: 10px 0 0; font-size: 2rem; letter-spacing: -1px; }

        /* --- HISTORY: TABLE DESIGN --- */
        .history-container { 
            background: white; 
            border-radius: 32px; 
            padding: 40px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; padding: 20px; border-bottom: 2px solid #f8fafc; }
        td { padding: 25px 20px; border-bottom: 1px solid #f8fafc; font-size: 1rem; }

        .status-badge { 
            background: var(--light-green); 
            color: var(--success-green); 
            padding: 6px 14px; 
            border-radius: 100px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            border: 1px solid #dcfce7;
        }

    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>MechRoute.</h2>
        <div class="nav-item active" onclick="showView('overview', this)">
            <span>Overview</span>
        </div>
        <div class="nav-item" onclick="showView('history', this)">
            <span>Service History</span>
        </div>
        
        <a href="booking.html" class="btn-book-nav">+ New Booking</a>
    </nav>

    <main class="main-content">
        
        <section id="overview" class="view-section active">
            <h1>Vehicle Overview</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <label>Fleet Health</label>
                    <h3 style="color: #16a34a;">98%</h3>
                </div>
                <div class="stat-card">
                    <label>Total Services</label>
                    <h3 id="statCount">0</h3>
                </div>
                <div class="stat-card">
                    <label>Last Expense</label>
                    <h3 id="lastExpense">₹0</h3>
                </div>
            </div>
        </section>

        <section id="history" class="view-section">
            <h1>Service Ledger</h1>
            <div class="history-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Amount Paid</th>
                            <th style="text-align: right;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logBody">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        // FUNCTION TO SWITCH VIEWS WITHOUT REFRESHING
        function showView(viewId, element) {
            // Hide all sections
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            // Show the selected section
            document.getElementById(viewId).classList.add('active');

            // Update sidebar active state
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }

        // LOAD DATA FROM LOCALSTORAGE
        window.addEventListener('load', function() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            
            // Update Overview Stats
            document.getElementById('statCount').innerText = logs.length;
            if(logs.length > 0) {
                document.getElementById('lastExpense').innerText = logs[logs.length - 1].price;
            }

            // Inject History Table
            const tbody = document.getElementById('logBody');
            
            if(logs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align:center; padding:60px; color:#94a3b8;">
                            <strong>No maintenance history recorded.</strong><br>
                            Your digital ledger will start after your first booking.
                        </td>
                    </tr>`;
                return;
            }

            // Display newest services at the top
            [...logs].reverse().forEach(log => {
                const row = `
                    <tr>
                        <td style="font-weight:600; color:#64748b;">${log.date}</td>
                        <td style="font-weight:700; color:var(--slate);">${log.service}</td>
                        <td style="font-weight:800; color:var(--slate);">${log.price}</td>
                        <td style="text-align: right;">
                            <span class="status-badge">VERIFIED</span>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        });
    </script>

</body>
</html>
