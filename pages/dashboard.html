<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --slate: #0f172a; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--slate); }

        /* --- TOP NAVIGATION (RESTORED) --- */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; background: white; border-bottom: 1px solid #e2e8f0;
        }

        /* BIGGER LOGO FIX */
        .logo { 
            font-size: 2.8rem; /* Increased as requested */
            font-weight: 800; letter-spacing: -3px; text-decoration: none; color: var(--slate);
        }
        .logo span { color: var(--brand); }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: #64748b; font-weight: 700; font-size: 0.9rem; }
        .btn-signin { background: var(--slate); color: white; padding: 10px 24px; border-radius: 100px; }

        /* --- LAYOUT WITH SIDEBAR --- */
        .dashboard-wrapper { display: flex; min-height: calc(100vh - 80px); }
        
        .sidebar { 
            width: 250px; background: white; border-right: 1px solid #e2e8f0; padding: 40px 20px;
        }
        .side-item { 
            padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; 
            color: #64748b; font-weight: 700; transition: 0.3s;
        }
        .side-item.active { background: #eff6ff; color: var(--brand); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 40px 5%; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .welcome-header { margin-bottom: 30px; }
        .welcome-header h1 { font-size: 2.2rem; letter-spacing: -1.5px; margin: 0; }
        .user-email { color: var(--brand); font-weight: 700; font-size: 0.9rem; margin-top: 5px; }

        /* ORIGINAL STAT CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .stat-card label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .stat-card h3 { margin: 10px 0 0; font-size: 1.8rem; }

        /* DYNAMIC HISTORY TABLE */
        .history-card { background: white; border-radius: 24px; padding: 30px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 20px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        .status-pill { background: #dcfce7; color: #166534; padding: 6px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">MechRoute<span>.</span></a>
        <div class="nav-links">
            <a href="#">Fleet</a>
            <a href="#">Services</a>
            <a href="#">Support</a>
            <a href="#" class="btn-signin">Sign In</a>
        </div>
    </nav>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="side-item active" onclick="showView('overview', this)">Overview</div>
            <div class="side-item" onclick="showView('history', this)">Service History</div>
            <a href="booking.html" style="text-decoration:none;">
                <div class="side-item" style="color: var(--brand);">+ Book Service</div>
            </a>
        </aside>

        <main class="main-content">
            <div class="welcome-header">
                <h1>Welcome back, Admin</h1>
                <div class="user-email">ID: admin.fleet@mechroute.com</div>
            </div>

            <section id="overview" class="view-section active">
                <div class="stats-grid">
                    <div class="stat-card"><label>System Health</label><h3 style="color:#16a34a;">Excellent</h3></div>
                    <div class="stat-card"><label>Total Services</label><h3 id="statCount">0</h3></div>
                    <div class="stat-card"><label>Next Visit</label><h3>Apr 2026</h3></div>
                </div>
            </section>

            <section id="history" class="view-section">
                <div class="history-card">
                    <table>
                        <thead>
                            <tr><th>Date</th><th>Service</th><th>Cost</th><th>Status</th></tr>
                        </thead>
                        <tbody id="logBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        function showView(viewId, element) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.side-item').forEach(s => s.classList.remove('active'));
            element.classList.add('active');
        }

        window.onload = function() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            document.getElementById('statCount').innerText = logs.length;
            
            const tbody = document.getElementById('logBody');
            if(logs.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:40px; color:#94a3b8;'>No records found.</td></tr>";
            } else {
                [...logs].reverse().forEach(log => {
                    tbody.innerHTML += `<tr>
                        <td style="font-weight:700; color:#64748b;">${log.date}</td>
                        <td style="font-weight:700;">${log.service}</td>
                        <td style="color:var(--brand); font-weight:800;">${log.price}</td>
                        <td><span class="status-pill">VERIFIED</span></td>
                    </tr>`;
                });
            }
        };
    </script>
</body>
</html>
