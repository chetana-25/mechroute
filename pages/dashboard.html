<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --sidebar-bg: #0f172a;
            --text-slate: #0f172a;
            --soft-slate: #64748b;
            --border-light: #f1f5f9;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            justify-content: space-between;
        }

        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 50px; }
        .nav-menu { flex-grow: 1; }
        
        .nav-item {
            padding: 16px 20px;
            border-radius: 12px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }

        .btn-book {
            background: var(--brand-blue);
            color: white;
            padding: 18px;
            border-radius: 14px;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            padding: 60px 80px;
            overflow-y: auto;
        }

        /* HEADER SECTION */
        .header-area { margin-bottom: 60px; }
        
        .welcome-text { 
            font-size: 2.2rem; /* Clean and not too big */
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -1px; 
            color: var(--text-slate); 
        }

        .id-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .fleet-badge {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--brand-blue);
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .fleet-email {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--soft-slate);
        }

        /* SECTION HEADING */
        .section-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text-slate);
            margin-bottom: 30px;
        }

        /* STATS GRID */
        .stats-grid {
            display: flex;
            gap: 24px;
        }

        .stat-card {
            flex: 1;
            padding: 45px 40px;
            border-radius: 32px;
            border: 1px solid var(--border-light);
            background: #ffffff;
            transition: 0.3s ease;
        }

        .stat-card:hover { border-color: var(--brand-blue); transform: translateY(-5px); }

        .stat-card h2 { font-size: 3rem; margin: 0; font-weight: 800; color: var(--text-slate); }
        .stat-card p { color: var(--soft-slate); font-weight: 600; margin-top: 10px; font-size: 1.1rem; }

        /* Blue outline for the primary stat */
        .border-blue { border: 2px solid var(--brand-blue); }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="logo">MechRoute.</div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">Overview</a>
                <a href="#" class="nav-item">Service History</a>
            </nav>
        </div>
        <a href="#" class="btn-book">+ Book Service</a>
    </aside>

    <main class="main-content">
        <header class="header-area">
            <h1 id="userNameDisplay" class="welcome-text">Welcome, Scout</h1>
            <div class="id-row">
                <span class="fleet-badge">Fleet ID</span>
                <span id="fleetEmailDisplay" class="fleet-email">name.surname@mechroute.com</span>
            </div>
        </header>

        <section>
            <h2 class="section-title">Vehicle Overview</h2>
            
            <div class="stats-grid">
                <div class="stat-card border-blue">
                    <h2>94%</h2>
                    <p>Engine Health</p>
                </div>
                <div class="stat-card">
                    <h2>2</h2>
                    <p>Total Services</p>
                </div>
                <div class="stat-card">
                    <h2>₹0</h2>
                    <p>Total Spent</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Extract Name Parts
            const firstName = localStorage.getItem('user_firstName') || "Scout";
            const lastName = localStorage.getItem('user_lastName') || "Member";

            // 2. Set Welcome Name
            document.getElementById('userNameDisplay').innerText = `Welcome, ${firstName}`;

            // 3. Generate and Set Fleet Email ID
            const fleetEmail = `${firstName.toLowerCase()}.${lastName.toLowerCase()}@mechroute.com`;
            document.getElementById('fleetEmailDisplay').innerText = fleetEmail;
        });
    </script>
</body>
</html>
