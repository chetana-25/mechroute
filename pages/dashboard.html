<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --sidebar-bg: #0f172a;
            --text-slate: #0f172a;
            --soft-slate: #64748b;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }

        .logo { font-size: 2rem; font-weight: 800; margin-bottom: 50px; }
        .nav-item {
            padding: 16px 20px;
            border-radius: 12px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
        }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }

        /* CONTENT */
        .main-content {
            flex-grow: 1;
            padding: 60px 80px;
        }

        /* UPDATED HEADER: Smaller & cleaner */
        .welcome-header { margin-bottom: 40px; }
        
        .welcome-header h1 { 
            font-size: 2.2rem; /* Scaled down from 3.5rem */
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -1px; 
            color: var(--text-slate); 
        }

        .id-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .fleet-id-label {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--brand-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .fleet-id-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--soft-slate);
        }

        /* CARDS */
        .stats-grid { display: flex; gap: 24px; margin-top: 30px; }
        .stat-card {
            flex: 1;
            padding: 35px;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
        }
        .stat-card h2 { font-size: 2.5rem; margin: 0; font-weight: 800; }
        .stat-card p { color: var(--soft-slate); font-weight: 600; margin-top: 8px; }
        .border-blue { border: 2px solid var(--brand-blue); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">MechRoute.</div>
        <nav>
            <a href="#" class="nav-item active">Overview</a>
            <a href="#" class="nav-item">Service History</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="welcome-header">
            <h1 id="welcomeName">Welcome, User</h1>
            
            <div class="id-row">
                <span class="fleet-id-label">Fleet ID</span>
                <span class="fleet-id-value" id="fleetEmail">user.name@mechroute.com</span>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card border-blue">
                <h2>94%</h2>
                <p>Engine Health</p>
            </div>
            <div class="stat-card">
                <h2>2</h2>
                <p>Total Services</p>
            </div>
            <div class="stat-card">
                <h2>₹0</h2>
                <p>Total Spent</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Extract Name Components
            const fName = localStorage.getItem('user_firstName') || "Scout";
            const lName = localStorage.getItem('user_lastName') || "Member";

            // 2. Display "Welcome, Firstname"
            document.getElementById('welcomeName').innerText = `Welcome, ${fName}`;

            // 3. Generate Fleet Email ID: name.surname@mechroute.com
            // We convert to lowercase and remove spaces for a clean email format
            const emailID = `${fName.toLowerCase()}.${lName.toLowerCase()}@mechroute.com`;
            document.getElementById('fleetEmail').innerText = emailID;
        });
    </script>
</body>
</html>
