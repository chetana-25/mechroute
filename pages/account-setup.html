<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ID Generated | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body style="background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card" style="max-width: 450px; text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🛡️</div>
        <h2>Identity Secured</h2>
        <div style="background: var(--brand-soft); padding: 1.5rem; border-radius: 12px; text-align: left; margin: 2rem 0; border: 1px solid var(--brand-light);">
            <p style="font-size: 0.7rem; color: var(--brand); font-weight: 800;">OFFICIAL LOGIN ID</p>
            <p id="display-email" style="font-weight: 700; font-size: 1.1rem; color: var(--text-main);"></p>
            <p style="font-size: 0.7rem; color: var(--brand); font-weight: 800; margin-top: 10px;">TEMP PASSWORD</p>
            <p style="font-weight: 700; font-size: 1.1rem; color: var(--text-main);">START2026</p>
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="window.location.href='login.html'">Proceed to Login</button>
    </div>
    <script>
        document.getElementById('display-email').innerText = sessionStorage.getItem('mechEmail') || "generating...";
    </script>
</body>
</html>
