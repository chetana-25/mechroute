<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fleet Login | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 45px; border-radius: 28px; border: 1px solid #f1f5f9; width: 400px; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; color: var(--dark); margin-bottom: 30px; }
        input { width: 100%; padding: 16px; margin-bottom: 18px; border: 1.5px solid #f1f5f9; border-radius: 14px; box-sizing: border-box; font-family: inherit; font-weight: 600; background: #f8fafc; outline: none; }
        .btn-login { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: var(--brand); }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">MechRoute.</div>
    <p style="color: #64748b; margin-bottom: 30px;">Enter your official Fleet ID and Password.</p>
    
    <form id="loginForm">
        <input type="text" id="loginID" placeholder="firstname.lastname@mechroute.com" required>
        <input type="password" id="loginPass" placeholder="Password" required>
        <button type="submit" class="btn-login">Verify & Access</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputID = document.getElementById('loginID').value.trim().toLowerCase();
        const inputPass = document.getElementById('loginPass').value;

        // Get the list of all registered users
        const users = JSON.parse(localStorage.getItem('mechroute_users')) || [];

        // VALIDATION: Checks if the ID and Password match a single entry exactly
        const validUser = users.find(u => u.fleetID === inputID && u.password === inputPass);

        if (validUser) {
            // Save the specific user's info for the dashboard to use
            localStorage.setItem('user_firstName', validUser.firstName);
            localStorage.setItem('user_email', validUser.fleetID);
            window.location.href = 'dashboard.html';
        } else {
            alert("Access Denied: Incorrect Fleet ID or Password.");
        }
    });
</script>

</body>
</html>
