<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .auth-card { width: 100%; max-width: 440px; padding: 60px; border-radius: 32px; border: 1px solid #f1f5f9; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.05); text-align: center; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1.5px; color: #0f172a; text-decoration: none; display: block; margin-bottom: 40px; }
        .logo span { color: #2563eb; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; transition: all 0.3s; }
        input:focus { outline: none; border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #0f172a; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="../index.html" class="logo">Mech<span>Route.</span></a>
        <h2 style="font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 10px;">Welcome Back.</h2>
        <p style="color: #64748b; margin-bottom: 40px;">Enter your credentials to access your dashboard.</p>
        
        <form action="dashboard.html">
            <input type="email" placeholder="Official Email Address" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-auth">Sign In</button>
        </form>
        
        <p style="margin-top: 30px; font-size: 0.9rem; color: #64748b;">
            New to the fleet? <a href="register.html" style="color: #2563eb; font-weight: 700; text-decoration: none;">Join now</a>
        </p>
    </div>
</body>
</html>
