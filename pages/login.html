<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body style="background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 class="text-center">MechRoute Portal</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>MechRoute ID</label>
                <input type="email" id="email" placeholder="name.mr@mechroute.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
    </div>
    <script src="../assets/js/script.js"></script>
</body>
</html>
