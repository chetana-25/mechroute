<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --slate: #0f172a; }
        body { background: #fcfdfe; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 60px 20px; }
        .checkout-card { background: white; width: 100%; max-width: 450px; border-radius: 32px; border: 1px solid #f1f5f9; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); }
        .bill-item { display: flex; justify-content: space-between; margin-bottom: 15px; color: #64748b; font-weight: 600; }
        .total-row { border-top: 2px dashed #e2e8f0; margin-top: 20px; padding-top: 20px; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.5rem; color: var(--slate); }
        .pay-btn { width: 100%; padding: 22px; background: var(--slate); color: white; border: none; border-radius: 18px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .pay-btn:hover { background: var(--brand); transform: translateY(-2px); }
        .loader-box { display: none; text-align: center; padding: 40px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--brand); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="checkout-card" id="invoice">
        <h2 style="letter-spacing: -1.5px; margin-bottom: 5px;">Service Invoice</h2>
        <p style="color: #94a3b8; font-size: 0.8rem; font-weight: 800; margin-bottom: 30px;">ID: MECH-INV-2026</p>
        
        <div class="bill-item"><span>Service Name</span> <span id="outName">---</span></div>
        <div class="bill-item"><span>Base Price</span> <span id="outBase">₹0</span></div>
        <div class="bill-item"><span>GST (18%)</span> <span id="outGST">₹0</span></div>
        
        <div class="total-row"><span>Total</span> <span id="outTotal">₹0</span></div>

        <button class="pay-btn" onclick="processPayment()">Confirm & Pay Securely</button>
    </div>

    <div class="checkout-card loader-box" id="processing">
        <div class="spinner"></div>
        <h3 style="letter-spacing: -1px;">Verifying with Bank...</h3>
        <p style="color: #64748b; font-size: 0.9rem;">Securing your transaction via UPI/Card Gateway</p>
    </div>

    <script>
        window.onload = function() {
            const name = localStorage.getItem('pending_service');
            const priceStr = localStorage.getItem('pending_price'); // e.g., "₹2499"
            const currency = localStorage.getItem('pending_currency') || "₹";

            if(!name) { window.location.href = 'booking.html'; return; }

            const basePrice = parseInt(priceStr.replace(/[^0-9]/g, ''));
            const gst = Math.round(basePrice * 0.18);
            const total = basePrice + gst;

            document.getElementById('outName').innerText = name;
            document.getElementById('outBase').innerText = currency + basePrice;
            document.getElementById('outGST').innerText = currency + gst;
            document.getElementById('outTotal').innerText = currency + total;
        }

        function processPayment() {
            document.getElementById('invoice').style.display = 'none';
            document.getElementById('processing').style.display = 'block';

            setTimeout(() => {
                // Permanent Log Entry
                const logEntry = {
                    date: localStorage.getItem('pending_date'),
                    service: localStorage.getItem('pending_service'),
                    price: document.getElementById('outTotal').innerText,
                    type: "PROACTIVE"
                };

                let history = JSON.parse(localStorage.getItem('fleet_logs')) || [];
                history.push(logEntry);
                localStorage.setItem('fleet_logs', JSON.stringify(history));

                alert("Payment Successful! Logged to your Fleet History.");
                window.location.href = 'logs.html';
            }, 2500);
        }
    </script>
</body>
</html>
