<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | MechRoute Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --slate: #0f172a; }
        body { background: #fcfdfe; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 60px 20px; }
        .checkout-card { background: white; width: 100%; max-width: 450px; border-radius: 32px; border: 1px solid #f1f5f9; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); }
        .bill-item { display: flex; justify-content: space-between; margin-bottom: 15px; color: #64748b; }
        .total-row { border-top: 2px dashed #e2e8f0; margin-top: 20px; padding-top: 20px; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.4rem; }
        .pay-btn { width: 100%; padding: 20px; background: var(--slate); color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .pay-btn:hover { background: var(--brand); transform: translateY(-2px); }
        .payment-sim { display: none; margin-top: 30px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--brand); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="checkout-card" id="mainInvoice">
        <h2 style="letter-spacing: -1px; margin-bottom: 30px;">Service Invoice</h2>
        <p style="font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; font-weight: 800;">Fleet Member Billing</p>
        
        <div id="billDetails">
            <div class="bill-item"><span id="srvName">Service</span> <span id="srvPrice">£0.00</span></div>
            <div class="bill-item"><span>Platform Fee</span> <span>£0.00</span></div>
            <div class="bill-item"><span>Tax (VAT)</span> <span>Included</span></div>
            <div class="total-row"><span>Total</span> <span id="totalPrice">£0.00</span></div>
        </div>

        <button class="pay-btn" onclick="startPayment()">Confirm & Proceed to Payment</button>
    </div>

    <div class="checkout-card payment-sim" id="paymentGateway">
        <div class="loader"></div>
        <h3>Securely Processing...</h3>
        <p style="color: #64748b;">Do not refresh. Handshaking with your bank.</p>
    </div>

    <script>
        // Load data from LocalStorage
        window.onload = function() {
            const name = localStorage.getItem('pending_service');
            const price = localStorage.getItem('pending_price');
            document.getElementById('srvName').innerText = name;
            document.getElementById('srvPrice').innerText = price;
            document.getElementById('totalPrice').innerText = price;
        }

        function startPayment() {
            document.getElementById('mainInvoice').style.display = 'none';
            document.getElementById('paymentGateway').style.display = 'block';

            // Simulate a 3-second bank processing delay
            setTimeout(() => {
                // Add to Permanent Logs
                const newEntry = {
                    date: localStorage.getItem('pending_date'),
                    service: localStorage.getItem('pending_service'),
                    type: "PROACTIVE"
                };
                let logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
                logs.push(newEntry);
                localStorage.setItem('fleet_logs', JSON.stringify(logs));

                alert("Payment Successful! Service Logged to your Fleet Identity.");
                window.location.href = 'logs.html';
            }, 3000);
        }
    </script>
</body>
</html>
