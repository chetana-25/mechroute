<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Fleet | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --deep-slate: #0f172a;
            --soft-slate: #64748b;
            --input-bg: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 40px;
            display: block;
            text-decoration: none;
            color: var(--deep-slate);
        }
        .logo span { color: var(--brand-blue); }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            color: var(--deep-slate);
        }

        p {
            color: var(--soft-slate);
            margin-bottom: 40px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--deep-slate);
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: var(--input-bg);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--brand-blue);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-register {
            width: 100%;
            background: var(--deep-slate);
            color: white;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: var(--brand-blue);
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.9rem;
        }

        .footer-text a {
            color: var(--brand-blue);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <a href="../index.html" class="logo">Mech<span>Route.</span></a>
        <h1>Create Account</h1>
        <p>Start your journey toward elite vehicle care.</p>

        <form id="registrationForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. Scout Miller" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-register">Join the Fleet</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page from refreshing

            // 1. GET THE NAME FROM INPUT
            const nameValue = document.getElementById('fullName').value;

            // 2. SAVE NAME TO LOCALSTORAGE
            // This is what the Dashboard will "Extract" later
            localStorage.setItem('user_name', nameValue);

            // 3. OPTIONAL: CLEAR OLD FLEET ID (To make a fresh one for a new user)
            localStorage.removeItem('user_fleet_id');

            // 4. REDIRECT TO DASHBOARD
            window.location.href = 'dashboard.html';
        });
    </script>

</body>
</html>
