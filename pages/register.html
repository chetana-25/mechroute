<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Fleet | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; min-height: 100vh; margin: 0; }
        /* Left Side: Visual/Context */
        .auth-side { flex: 1; background: radial-gradient(circle at top right, #eff6ff 0%, #ffffff 100%); display: flex; flex-direction: column; justify-content: center; padding: 0 10%; }
        /* Right Side: Form */
        .auth-form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; border-left: 1px solid #f1f5f9; }
        .form-container { width: 100%; max-width: 400px; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1.5px; color: #0f172a; text-decoration: none; margin-bottom: 60px; display: inline-block; }
        .logo span { color: #2563eb; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: #2563eb; background: white; outline: none; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #2563eb; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-auth:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body>
    <div class="auth-side">
        <a href="../index.html" class="logo">Mech<span>Route.</span></a>
        <h1 style="font-size: 3rem; letter-spacing: -2px; line-height: 1.1; margin-bottom: 20px;">Start Your <br><span style="color: #2563eb;">Journey.</span></h1>
        <p style="color: #64748b; font-size: 1.2rem; line-height: 1.6; max-width: 400px;">
            Join the elite fleet and experience the full spectrum of automotive care.
        </p>
    </div>
    <div class="auth-form-side">
        <div class="form-container">
            <h2 style="font-size: 1.8rem; margin-bottom: 30px; letter-spacing: -1px;">Create Member Profile.</h2>
            <form action="dashboard.html">
                <div style="display: flex; gap: 15px;">
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                </div>
                <input type="email" placeholder="Personal Email" required>
                <input type="password" placeholder="Create Password" required>
                <button type="submit" class="btn-auth">Initialize Profile</button>
            </form>
            <p style="margin-top: 30px; font-size: 0.9rem; color: #64748b; text-align: center;">
                Already a member? <a href="login.html" style="color: #2563eb; font-weight: 700; text-decoration: none;">Sign in here</a>
            </p>
        </div>
    </div>
</body>
</html>
