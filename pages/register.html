<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join the Fleet | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 380px; }
        h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; color: var(--dark); }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-weight: 600; }
        .btn { width: 100%; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--brand); transform: translateY(-2px); }
        .footer { margin-top: 20px; text-align: center; font-size: 0.85rem; color: #64748b; }
        .footer a { color: var(--brand); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="card">
    <h2>Create Account</h2>
    <p>Get your official MechRoute Fleet ID.</p>
    <form id="regForm">
        <input type="text" id="fName" placeholder="First Name" required>
        <input type="text" id="lName" placeholder="Last Name" required>
        <input type="password" id="pass" placeholder="Create Password" required>
        <button type="submit" class="btn">Register & Generate ID</button>
    </form>
    <div class="footer">Already have an ID? <a href="login.html">Login</a></div>
</div>

<script>
    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const fName = document.getElementById('fName').value.trim();
        const lName = document.getElementById('lName').value.trim();
        const pass = document.getElementById('pass').value;

        // Generate the Official Fleet ID
        const generatedID = `${fName.toLowerCase()}.${lName.toLowerCase()}@mechroute.com`;

        const newUser = {
            fleetID: generatedID,
            password: pass,
            firstName: fName,
            lastName: lName
        };

        // Get existing users or start new list
        let users = JSON.parse(localStorage.getItem('mechroute_users')) || [];
        
        // Prevent duplicate IDs
        if(users.some(u => u.fleetID === generatedID)) {
            alert("This name combination already has a Fleet ID!");
            return;
        }

        users.push(newUser);
        localStorage.setItem('mechroute_users', JSON.stringify(users));

        alert(`SUCCESS!\nYour Official Fleet ID is: ${generatedID}\nUse this ID and your password to login.`);
        window.location.href = 'login.html';
    });
</script>

</body>
</html>
