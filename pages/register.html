<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Fleet | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; min-height: 100vh; margin: 0; }
        .auth-side { flex: 1; background: radial-gradient(circle at top right, #eff6ff 0%, #ffffff 100%); display: flex; flex-direction: column; justify-content: center; padding: 0 10%; }
        .auth-form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; border-left: 1px solid #f1f5f9; }
        .form-container { width: 100%; max-width: 400px; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1.5px; color: #0f172a; text-decoration: none; margin-bottom: 60px; display: inline-block; }
        .logo span { color: #2563eb; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: #2563eb; background: white; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #0f172a; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-auth:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="auth-side">
        <a href="../index.html" class="logo">Mech<span>Route.</span></a>
        <h1 style="font-size: 3.5rem; letter-spacing: -3px; line-height: 1; margin-bottom: 24px;">Initialize Your <br><span style="color: #2563eb;">Identity.</span></h1>
        <p style="color: #64748b; font-size: 1.2rem; line-height: 1.6; max-width: 420px;">
            Enter your details to generate your unique professional Fleet ID and access the spectrum.
        </p>
    </div>
    <div class="auth-form-side">
        <div class="form-container">
            <h2 style="font-size: 1.8rem; margin-bottom: 30px; letter-spacing: -1px;">Member Registration</h2>
            <form id="registrationForm">
                <div style="display: flex; gap: 15px;">
                    <input type="text" id="firstName" placeholder="First Name" required>
                    <input type="text" id="lastName" placeholder="Last Name" required>
                </div>
                <input type="email" id="personalEmail" placeholder="Personal Email (for recovery)" required>
                <input type="password" placeholder="Create Secure Password" required>
                <button type="submit" class="btn-auth">Generate Fleet ID</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const first = document.getElementById('firstName').value.toLowerCase().trim();
            const last = document.getElementById('lastName').value.toLowerCase().trim();
            
            // Generate the professional email
            const fleetEmail = `${first}.${last}@mechroute.com`;
            
            // Store in localStorage for the dashboard to "extract"
            localStorage.setItem('userEmail', fleetEmail);
            localStorage.setItem('userName', first.charAt(0).toUpperCase() + first.slice(1));
            
            // Redirect to the elite dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
