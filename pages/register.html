<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join MechRoute | Register</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body style="background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card" style="width: 100%; max-width: 450px;">
        <h2>Join the Fleet</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Use your Gmail to generate a Professional ID.</p>
        <form onsubmit="generateCredentials(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Alex Johnson" required>
            </div>
            <div class="form-group">
                <label>Personal Gmail</label>
                <input type="email" id="user-gmail" placeholder="name@gmail.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Generate Pro ID</button>
        </form>
    </div>
    <script src="../assets/js/script.js"></script>
</body>
</html>
