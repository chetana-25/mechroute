<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schedule Service | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body style="background: var(--bg);">

    <nav>
        <a href="dashboard.html" class="logo">MechRoute</a>
        <div class="badge badge-success">Pre-Booking Portal</div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem;">Schedule Maintenance</h2>
            <form onsubmit="alert('Booking Confirmed! Check your MechRoute ID for details.'); window.location.href='dashboard.html'; return false;">
                
                <div class="form-group">
                    <label>Select Service</label>
                    <select style="width: 100%; padding: 0.75rem; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white;">
                        <option>Full Engine Diagnostic</option>
                        <option>Oil & Filter Change</option>
                        <option>Brake System Overhaul</option>
                        <option>Battery Health Check</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Preferred Date</label>
                    <input type="date" required>
                </div>

                <div class="form-group">
                    <label>Preferred Time Slot</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button type="button" class="btn btn-secondary" onclick="this.style.background='var(--brand)'">Morning (9AM-12PM)</button>
                        <button type="button" class="btn btn-secondary" onclick="this.style.background='var(--brand)'">Afternoon (1PM-5PM)</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
