<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --deep-slate: #0f172a;
            --soft-slate: #64748b;
            --input-bg: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .booking-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: white;
            border-radius: 32px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
        }

        h1 { font-size: 2rem; font-weight: 800; color: var(--deep-slate); margin-bottom: 8px; letter-spacing: -1px; }
        p { color: var(--soft-slate); margin-bottom: 32px; font-weight: 500; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; color: var(--deep-slate); text-transform: uppercase; letter-spacing: 0.5px; }

        input, select {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: var(--input-bg);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus { outline: none; border-color: var(--brand-blue); background: white; }

        .btn-confirm {
            width: 100%;
            background: var(--brand-blue);
            color: white;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-confirm:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .back-link { display: block; margin-top: 20px; text-decoration: none; color: var(--soft-slate); font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="booking-container">
        <h1>Book Service</h1>
        <p>Schedule your next maintenance elite-tier check.</p>

        <form id="bookingForm">
            <div class="form-group">
                <label>Service Type</label>
                <select id="serviceType" required>
                    <option value="General Checkup">General Checkup</option>
                    <option value="Oil & Filter Change">Oil & Filter Change</option>
                    <option value="Brake Pad Replacement">Brake Pad Replacement</option>
                    <option value="Engine Diagnostics">Engine Diagnostics</option>
                </select>
            </div>

            <div class="form-group">
                <label>Preferred Date</label>
                <input type="date" id="serviceDate" required>
            </div>

            <button type="submit" class="btn-confirm">Confirm Booking</button>
        </form>
        
        <center><a href="dashboard.html" class="back-link">Return to Dashboard</a></center>
    </div>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. Capture inputs
            const type = document.getElementById('serviceType').value;
            const date = document.getElementById('serviceDate').value;
            
            // 2. Generate random price for the ledger
            const price = "₹" + (Math.floor(Math.random() * 3000) + 1500);

            // 3. Create entry matching logs.html structure
            const newEntry = {
                date: date,
                type: "Proactive", // Matches badge-proactive class
                service: type,
                price: price
            };

            // 4. Save to 'fleet_logs' (CRITICAL for logs.html)
            const existingLogs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            existingLogs.push(newEntry);
            localStorage.setItem('fleet_logs', JSON.stringify(existingLogs));

            // 5. Success and Redirect
            alert("Booking Confirmed! Viewing your Service Ledger.");
            window.location.href = 'logs.html'; // Points to your Ledger page
        });
    </script>

</body>
</html>
