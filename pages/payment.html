<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tracking & Payment | MechRoute</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body style="background: var(--bg);">
    <div class="container" style="max-width: 600px; padding-top: 50px;">
        
        <div id="tracking-section" class="card text-center">
            <h2 style="color: var(--brand);">Mechanic is En Route</h2>
            <p>Estimated arrival: 8 minutes</p>
            <div style="background: #eee; height: 10px; border-radius: 5px; margin: 2rem 0; overflow: hidden;">
                <div id="progress-fill" style="background: var(--brand); height: 100%; width: 0%; transition: width 0.1s linear;"></div>
            </div>
            <p style="font-size: 0.9rem; color: var(--text-muted);">Please stay with your vehicle.</p>
        </div>

        <div id="payment-section" class="card hidden">
            <h2 class="text-center">Service Complete</h2>
            <p class="text-center">Confirm payment to finalize the session.</p>
            <div style="margin: 2rem 0; padding: 1rem; background: var(--brand-soft); border-radius: 8px;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Service Fee</span>
                    <strong>$45.00</strong>
                </div>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="alert('Payment Successful!')">Pay with Card</button>
        </div>

    </div>
    <script src="../assets/js/script.js"></script>
</body>
</html>
