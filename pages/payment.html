<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --deep-slate: #0f172a;
            --soft-slate: #64748b;
            --border: #e2e8f0;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfdfe; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .payment-card {
            background: white; width: 100%; max-width: 450px; padding: 40px;
            border-radius: 32px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .price-display { 
            font-size: 2.5rem; font-weight: 800; color: var(--brand-blue); 
            margin: 20px 0; display: block;
        }

        .method-list { margin: 30px 0; text-align: left; }
        .method {
            padding: 15px; border: 1px solid var(--border); border-radius: 16px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .method:hover { border-color: var(--brand-blue); background: #f8fafc; }

        .btn-pay {
            width: 100%; padding: 20px; background: var(--deep-slate); color: white;
            border: none; border-radius: 18px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .btn-pay:hover { background: var(--brand-blue); transform: translateY(-2px); }

        #success-state, #tracking-section, .hidden { display: none; }
        .check-icon { font-size: 4rem; color: #10b981; margin-bottom: 20px; }
        
        .progress-container { background: #f1f5f9; height: 8px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progress-fill { background: var(--brand-blue); height: 100%; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div class="payment-card">
        
        <div id="payment-section">
            <div id="payment-input">
                <h2>Confirm Payment</h2>
                <p id="serviceName" style="color: var(--soft-slate);">Service Authorization</p>
                
                <span class="price-display" id="displayPrice">₹0</span>

                <div class="method-list">
                    <div class="method"><input type="radio" name="pay" checked> UPI (GPay/PhonePe)</div>
                    <div class="method"><input type="radio" name="pay"> Credit / Debit Card</div>
                    <div class="method"><input type="radio" name="pay"> Cash on Delivery</div>
                </div>

                <button class="btn-pay" onclick="handlePaymentFlow()">Confirm & Pay</button>
            </div>

            <div id="success-state">
                <div class="check-icon">✓</div>
                <h2>Payment Successful</h2>
                <p style="color: var(--soft-slate); margin-bottom: 30px;">Your transaction is complete. Thank you for using MechRoute.</p>
                <button onclick="finishAndRedirect()" style="background: none; border: none; color: var(--brand-blue); font-weight: 700; cursor: pointer; font-size: 1rem;">Return to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Grab the active job data to show the correct price
            const jobData = localStorage.getItem('active_job_status');
            const amountDisplay = document.getElementById('displayPrice'); 
            const serviceLabel = document.getElementById('serviceName');

            if (jobData) {
                const data = JSON.parse(jobData);
                if (data.price) {
                    amountDisplay.innerText = data.price; 
                }
                if (data.service) {
                    serviceLabel.innerText = data.service;
                }
            }
        });

        function handlePaymentFlow() {
            const btn = document.querySelector('.btn-pay');
            btn.innerHTML = "Processing...";
            btn.disabled = true;
            
            // Simulate bank processing time
            setTimeout(() => {
                document.getElementById('payment-input').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';
            }, 1500);
        }

        function finishAndRedirect() {
            // CRITICAL: Clear active session data AFTER successful payment
            localStorage.removeItem('active_job_status');
            localStorage.removeItem('active_otp');
            
            // Redirect back to dashboard
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
