<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --deep-slate: #0f172a;
            --soft-slate: #64748b;
            --border: #e2e8f0;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfdfe; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .payment-card {
            background: white; width: 100%; max-width: 450px; padding: 40px;
            border-radius: 32px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .price-display { 
            font-size: 2.5rem; font-weight: 800; color: var(--brand-blue); 
            margin: 20px 0; display: block;
        }

        .method-list { margin: 30px 0; text-align: left; }
        .method {
            padding: 15px; border: 1px solid var(--border); border-radius: 16px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .method:hover { border-color: var(--brand-blue); background: #f8fafc; }
        .method input { cursor: pointer; width: 18px; height: 18px; }

        .btn-pay {
            width: 100%; padding: 20px; background: var(--deep-slate); color: white;
            border: none; border-radius: 18px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .btn-pay:hover { background: var(--brand-blue); transform: translateY(-2px); }
        .btn-pay:disabled { background: var(--soft-slate); cursor: not-allowed; }

        #success-state { display: none; }
        .check-icon { 
            font-size: 4rem; color: #10b981; margin-bottom: 20px; 
            background: #ecfdf5; width: 80px; height: 80px; line-height: 80px;
            border-radius: 50%; margin: 0 auto 20px auto;
        }
    </style>
</head>
<body>

    <div class="payment-card">
        <div id="payment-section">
            <div id="payment-input">
                <h2>Confirm Payment</h2>
                <p id="serviceName" style="color: var(--soft-slate);">Service Authorization</p>
                
                <span class="price-display" id="displayPrice">₹0</span>

                <div class="method-list">
                    <label class="method"><input type="radio" name="pay" checked> UPI (GPay/PhonePe)</label>
                    <label class="method"><input type="radio" name="pay"> Credit / Debit Card</label>
                    <label class="method"><input type="radio" name="pay"> Cash on Delivery</label>
                </div>

                <button class="btn-pay" onclick="handlePaymentFlow()">Confirm & Pay</button>
            </div>

            <div id="success-state">
                <div class="check-icon">✓</div>
                <h2>Payment Successful</h2>
                <p style="color: var(--soft-slate); margin-bottom: 30px;">Your transaction is complete. A receipt has been sent to your email.</p>
                <button onclick="finishAndRedirect()" style="background: var(--brand-blue); border: none; color: white; padding: 15px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%;">Return to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const amountDisplay = document.getElementById('displayPrice'); 
            const serviceLabel = document.getElementById('serviceName');

            // Get the live job data
            const jobData = localStorage.getItem('active_job_status');
            
            if (jobData) {
                const data = JSON.parse(jobData);
                if (data.price) {
                    amountDisplay.innerText = data.price;
                    if (data.service) serviceLabel.innerText = data.service;
                }
            } else {
                // If no active job, redirect back (security check)
                window.location.href = 'dashboard.html';
            }
        });

        function handlePaymentFlow() {
            const btn = document.querySelector('.btn-pay');
            btn.innerHTML = "Verifying Transaction...";
            btn.disabled = true;
            
            setTimeout(() => {
                // --- ARCHIVING LOGIC ---
                const jobData = localStorage.getItem('active_job_status');
                if (jobData) {
                    const completedJob = JSON.parse(jobData);
                    
                    // Add completion metadata
                    completedJob.status = "Completed";
                    completedJob.paymentDate = new Date().toLocaleString();
                    
                    // Save to Permanent Logs
                    let logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
                    logs.push(completedJob);
                    localStorage.setItem('fleet_logs', JSON.stringify(logs));
                }

                // Show Success UI
                document.getElementById('payment-input').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';
            }, 2000);
        }

        function finishAndRedirect() {
            // CRITICAL: Clear the active session so the dashboard resets for the next service
            localStorage.removeItem('active_job_status');
            localStorage.removeItem('active_otp');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
