<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Ledger | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #fcfdfe; font-family: 'Plus Jakarta Sans', sans-serif; padding: 60px 8%; margin: 0; }
        .log-container { max-width: 1000px; margin: 0 auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        
        .log-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .log-row { background: white; transition: transform 0.2s; }
        .log-row:hover { transform: scale(1.01); }

        td { padding: 25px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-weight: 600; vertical-align: middle; }
        td:first-child { border-left: 1px solid #f1f5f9; border-radius: 20px 0 0 20px; color: #64748b; width: 30%; }
        td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 20px 20px 0; text-align: right; }

        .badge { padding: 6px 14px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .badge-best { background: #ecfdf5; color: #10b981; }
        .badge-preventative { background: #eff6ff; color: #2563eb; }
        .badge-standard { background: #f1f5f9; color: #64748b; }

        /* DELETE BUTTON STYLE */
        .btn-delete {
            background: #fff1f2;
            color: #e11d48;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            margin-left: 20px;
        }
        .btn-delete:hover { background: #e11d48; color: white; }

        .empty-state { text-align: center; padding: 80px; color: #94a3b8; font-weight: 600; }
        
        .nav-link { text-decoration: none; font-weight: 700; color: #0f172a; border-bottom: 2px solid #2563eb; padding-bottom: 4px; }
    </style>
</head>
<body>
    <div class="log-container">
        <div class="header-flex">
            <div>
                <h1 style="font-size: 2.5rem; letter-spacing: -2px; margin: 0;">Service Ledger</h1>
                <p style="color: #64748b; margin-top: 5px;">Manage your verified maintenance history.</p>
            </div>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
        </div>

        <table class="log-table" id="ledgerTable">
            </table>
    </div>

    <script>
        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            const table = document.getElementById('ledgerTable');
            table.innerHTML = ""; // Clear table

            if(logs.length === 0) {
                table.innerHTML = "<div class='empty-state'>No active service bookings found.</div>";
                return;
            }

            // Show latest bookings at the top
            logs.slice().reverse().forEach((entry, index) => {
                // Correctly map the real index because of the reverse()
                const actualIndex = logs.length - 1 - index;
                
                // Determine badge style based on type
                let badgeClass = "badge-standard";
                if(entry.type === "Best") badgeClass = "badge-best";
                if(entry.type === "Preventative") badgeClass = "badge-preventative";

                const row = `
                    <tr class="log-row">
                        <td>${entry.date}</td>
                        <td><span class="badge ${badgeClass}">${entry.type}</span></td>
                        <td style="color: #0f172a;">${entry.service}</td>
                        <td style="color: #166534; font-weight: 800;">
                            ${entry.price}
                            <button class="btn-delete" onclick="deleteService(${actualIndex})">Cancel</button>
                        </td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        }

        function deleteService(index) {
            if(confirm("Are you sure you want to cancel this service?")) {
                let logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
                // Remove the specific service from the array
                logs.splice(index, 1);
                // Save the updated list back to storage
                localStorage.setItem('fleet_logs', JSON.stringify(logs));
                // Refresh the table
                renderLogs();
            }
        }

        // Initialize table on load
        window.onload = renderLogs;
    </script>
</body>
</html>
