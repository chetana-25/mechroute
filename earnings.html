<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Earnings | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding: 40px; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; margin: auto; text-align: center; }
        .amount { font-size: 3.5rem; font-weight: 800; color: #2563eb; margin: 20px 0; }
        .btn-back { background: #0f172a; color: white; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: 700; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <p style="text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 800;">Total Wallet Balance</p>
        <div id="displayEarnings" class="amount">₹0</div>
        <div id="earningsList" style="text-align:left; margin: 30px 0; color:#0f172a;"></div>
        <a href="partner_dashboard.html" class="btn-back">Return to Terminal</a>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        (async () => {
            try {
                const data = await window.MechRouteAPI.getPartnerEarnings();
                document.getElementById('displayEarnings').innerText = `₹${data.totalEarnings || 0}`;

                const entries = data.entries || [];
                const list = document.getElementById('earningsList');
                if (entries.length === 0) {
                    list.innerHTML = '<p style="color:#64748b;">No completed jobs yet.</p>';
                    return;
                }

                list.innerHTML = entries.slice(0, 6).map((entry) => `
                    <div style="display:flex; justify-content:space-between; gap:16px; padding:12px 0; border-bottom:1px solid #e2e8f0;">
                        <div>
                            <div style="font-weight:700;">${entry.service_name}</div>
                            <div style="font-size:0.8rem; color:#64748b;">${new Date(entry.created_at).toLocaleString()}</div>
                        </div>
                        <div style="font-weight:800; color:#2563eb;">₹${entry.amount}</div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('displayEarnings').innerText = '₹0';
            }
        })();
    </script>
</body>
</html>
