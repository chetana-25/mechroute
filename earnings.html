<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Earnings | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding: 40px; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; margin: auto; text-align: center; }
        .amount { font-size: 3.5rem; font-weight: 800; color: #2563eb; margin: 20px 0; }
        .btn-back { background: #0f172a; color: white; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: 700; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <p style="text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 800;">Total Wallet Balance</p>
        <div id="displayEarnings" class="amount">₹0</div>
        <a href="partner_dashboard.html" class="btn-back">Return to Terminal</a>
    </div>

    <script>
        const total = localStorage.getItem('total_earnings') || 0;
        document.getElementById('displayEarnings').innerText = `₹${total}`;
    </script>
</body>
</html>
