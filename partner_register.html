<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Verification | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8fafc; }
        .reg-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { font-weight: 800; margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #0f172a; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="reg-card">
        <h2 id="reg-title">Verification</h2>
        <form action="partner_dashboard.html">
            <label id="name-label">Business Name</label>
            <input type="text" placeholder="Enter name" required>

            <label id="cred-label">Credential Number</label>
            <input type="text" placeholder="ID Number" required>

            <label>Contact Email</label>
            <input type="email" placeholder="email@example.com" required>

            <button type="submit" class="btn">Complete Setup</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('partner_type');
            const title = document.getElementById('reg-title');
            const nameLabel = document.getElementById('name-label');
            const credLabel = document.getElementById('cred-label');

            if (role === 'workshop') {
                title.innerText = "Workshop Registration";
                nameLabel.innerText = "Registered Workshop Name";
                credLabel.innerText = "Trade License Number (GSTIN)";
            } else if (role === 'expert') {
                title.innerText = "Technician Registration";
                nameLabel.innerText = "Full Legal Name";
                credLabel.innerText = "Technical Certification ID (ASE/MECH)";
            }
        });
    </script>
</body>
</html>
