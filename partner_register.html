<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Verification | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #2563eb;
            --dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-light); 
            margin: 0;
        }

        .reg-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid var(--border);
        }

        h2 { 
            font-weight: 800; 
            margin-bottom: 8px; 
            letter-spacing: -1px; 
            color: var(--dark);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 8px; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            margin-bottom: 20px; 
            font-weight: 600; 
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: #f1f5f9; /* Matches your screenshot style */
        }

        input:focus {
            outline: none;
            border-color: var(--brand);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--dark); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn:hover { 
            background: var(--brand); 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>

    <div class="reg-card">
        <h2 id="reg-title">Partner Verification</h2>
        <p class="subtitle">Complete your details to generate your partner credentials.</p>
        
        <form id="regForm">
            <label id="name-label">Workshop Name</label>
            <input type="text" id="partnerName" placeholder="e.g. Drive Mechanics" required>

            <label id="cred-label">Credential Number</label>
            <input type="text" id="credentialID" placeholder="Enter License or ID" required>

            <label>Contact Email</label>
            <input type="email" id="partnerEmail" placeholder="you@example.com" required>

            <button type="submit" class="btn" id="submitBtn">Complete Setup</button>
        </form>
    </div>

    <script src="assets/js/script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('partner_type');
            
            // Safety: Redirect if no role selected
            if (!role) {
                window.location.href = 'partner_terminal.html';
                return;
            }

            const titleEl = document.getElementById('reg-title');
            const nameLabelEl = document.getElementById('name-label');
            const credLabelEl = document.getElementById('cred-label');

            if (role === 'workshop') {
                titleEl.innerText = "Workshop Registration";
                nameLabelEl.innerText = "Workshop Name";
                credLabelEl.innerText = "Trade License Number (GSTIN)";
            } else {
                titleEl.innerText = "Technician Registration";
                nameLabelEl.innerText = "Full Legal Name";
                credLabelEl.innerText = "Technical Certification ID (ASE/MECH)";
            }
        });
    </script>
</body>
</html>
