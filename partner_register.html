<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Verification | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8fafc; }
        .reg-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { font-weight: 800; margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; font-weight: 600; }
        .btn { width: 100%; padding: 18px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="reg-card">
        <h2 id="reg-title">Verification</h2>
        <form id="regForm">
            <label id="name-label">Workshop Name</label>
            <input type="text" id="partnerName" placeholder="Enter name" required>

            <label id="cred-label">Credential Number</label>
            <input type="text" id="credentialID" placeholder="ID Number" required>

            <label>Contact Email</label>
            <input type="email" id="partnerEmail" placeholder="email@example.com" required>

            <button type="submit" class="btn">Complete Setup</button>
        </form>
    </div>

    <script src="script.js"></script>

    <script>
        // Internal script for UI labels
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('partner_type');
            if (role === 'workshop') {
                document.getElementById('reg-title').innerText = "Workshop Registration";
                document.getElementById('name-label').innerText = "Workshop Name";
                document.getElementById('cred-label').innerText = "Trade License Number (GSTIN)";
            } else {
                document.getElementById('reg-title').innerText = "Technician Registration";
                document.getElementById('name-label').innerText = "Full Legal Name";
                document.getElementById('cred-label').innerText = "Technical Certification ID (ASE/MECH)";
            }
        });

        // 2. Attach the listener directly to the form ID
        document.getElementById('regForm').addEventListener('submit', function(e) {
            handlePartnerRegistration(e);
        });
    </script>
</body>
</html>
