<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechRoute | Partner Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #2563eb;
            --dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #ffffff; color: var(--dark); overflow-x: hidden; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: white; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--brand); }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.9rem; margin-left: 30px; }
        .btn-login { background: var(--dark); color: white !important; padding: 10px 20px; border-radius: 10px; transition: 0.3s; }

        .hero { padding: 100px 8%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        
        .registration-box {
            background: var(--bg-light); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px; margin-top: 50px; width: 100%; max-width: 800px;
        }

        .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        
        .type-card {
            background: white; 
            border: 2px solid var(--border); 
            border-radius: 16px;
            padding: 25px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-align: left;
        }

        /* The Visual "Selected" State */
        .type-card.selected { 
            border-color: var(--brand) !important; 
            background: #eff6ff !important; 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.1);
        }
        
        .legal-tag { 
            font-size: 0.7rem; font-weight: 800; color: var(--brand); 
            background: #eff6ff; padding: 4px 8px; border-radius: 6px; 
        }

        .btn-join { 
            width: 100%; margin-top: 30px; padding: 16px 40px; background: var(--dark); color: white; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-join:hover { background: var(--brand); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MechRoute<span>.Partner</span></div>
        <div class="nav-links">
            <a href="index.html">Switch Role</a>
            <a href="partner_login.html" class="btn-login">Sign In</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Expert Tools for <span style="color:var(--brand)">Certified</span> Mechanics.</h1>
        <p style="color: var(--text-muted);">Select your business type to begin the verification process.</p>
        
        <div class="registration-box">
            <h2>Select Registration Type</h2>
            <div class="type-grid">
                <div class="type-card" id="workshop-card" onclick="selectType('workshop')">
                    <span class="legal-tag">BUSINESS ENTITY</span>
                    <h3 style="margin-top:10px;">Workshop / Store</h3>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Trade License & GST required.</p>
                </div>

                <div class="type-card" id="expert-card" onclick="selectType('expert')">
                    <span class="legal-tag">FREELANCE EXPERT</span>
                    <h3 style="margin-top:10px;">Individual Tech</h3>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Certification & ID required.</p>
                </div>
            </div>
            <button class="btn-join" onclick="goToRegister()">Continue to Registration</button>
        </div>
    </section>

    <script>
        // Make sure this is globally accessible
        function selectType(role) {
            console.log("Selected role:", role); // For debugging
            localStorage.setItem('partner_type', role);
            
            // Remove selection from all
            document.querySelectorAll('.type-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Add to current
            const activeCard = document.getElementById(role + '-card');
            if (activeCard) {
                activeCard.classList.add('selected');
            }
        }

        function goToRegister() {
            const role = localStorage.getItem('partner_type');
            if (!role || role === "null") {
                alert("Please select a registration type (Workshop or Individual) first.");
                return;
            }
            window.location.href = 'partner_register.html';
        }
    </script>
</body>
</html>
