<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechRoute | Partner Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --dark: #0f172a; --text-muted: #64748b; --bg-light: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #ffffff; color: var(--dark); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 800; } .logo span { color: var(--brand); }
        .hero { padding: 100px 8%; display: flex; align-items: center; justify-content: center; }
        .registration-box { background: var(--bg-light); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 800px; }
        .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .type-card { background: white; border: 2px solid transparent; border-radius: 16px; padding: 25px; cursor: pointer; transition: 0.3s; }
        .legal-tag { font-size: 0.7rem; font-weight: 800; color: var(--brand); background: #eff6ff; padding: 4px 8px; border-radius: 6px; }
        .btn-join { width: 100%; margin-top: 30px; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">MechRoute<span>.Partner</span></div>
        <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Switch Role</a>
    </nav>

    <section class="hero">
        <div class="registration-box">
            <h2 style="text-align:center; font-weight:800;">Select Registration Type</h2>
            <div class="type-grid">
                <div class="type-card" id="workshop-card" onclick="selectPartnerType('workshop')">
                    <span class="legal-tag">BUSINESS ENTITY</span>
                    <h3>Workshop / Store</h3>
                    <p>Physical garages with multiple techs.</p>
                </div>
                <div class="type-card" id="expert-card" onclick="selectPartnerType('expert')">
                    <span class="legal-tag">FREELANCE EXPERT</span>
                    <h3>Individual Tech</h3>
                    <p>Certified independent experts.</p>
                </div>
            </div>
            <button class="btn-join" onclick="window.location.href='partner_register.html'">Continue to Registration</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
