<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #2563eb; --sidebar-bg: #0f172a; --text-slate: #0f172a; --soft-slate: #64748b; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #fff; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 40px 24px; justify-content: space-between; }
        .nav-link { display:block; color:#94a3b8; text-decoration:none; margin-bottom:20px; font-weight:700; }
        .nav-link.active { color: white; }
        .main-content { flex-grow: 1; padding: 60px 80px; overflow-y: auto; }
        .welcome-text { font-size: 2.4rem; font-weight: 800; color: var(--text-slate); margin: 0; letter-spacing: -1px; }
        .partner-type-badge { font-size: 0.7rem; font-weight: 800; color: white; background: var(--brand-blue); padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .job-card { background: white; border: 1px solid #f1f5f9; padding: 25px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .btn-accept { background: var(--text-slate); color: white; padding: 14px 28px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-accept:hover { background: var(--brand-blue); transform: translateY(-2px); }
        .stat-box { flex: 1; padding: 25px; border-radius: 20px; border: 1px solid #f1f5f9; }
        .btn-logout { background: #334155; color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; }
        
        /* New UI States */
        #otpVerificationArea { display: none; margin-top: 20px; }
        #workInProgressArea { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div>
            <div style="font-size: 1.5rem; font-weight: 800;">MechRoute<span style="color:var(--brand-blue)">.Partner</span></div>
            <nav style="margin-top: 60px;">
                <a href="#" class="nav-link active">Job Terminal</a>
                <a href="#" class="nav-link">Earnings</a>
            </nav>
        </div>
        <button onclick="logout()" class="btn-logout">Logout Terminal</button>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="partnerNameDisplay" class="welcome-text">Welcome, Partner</h1>
            <div style="margin-top: 12px;">
                <span id="typeBadge" class="partner-type-badge">Expert</span>
                <span id="partnerEmailDisplay" style="margin-left:10px; font-weight:600; color:var(--soft-slate);"></span>
            </div>
        </header>

        <div class="stats-row" style="display: flex; gap: 20px; margin-top: 30px;">
            <div class="stat-box"><h2>₹0</h2><p style="font-size:0.7rem; font-weight:800; color:var(--soft-slate);">TODAY'S EARNINGS</p></div>
            <div class="stat-box"><h2>0</h2><p style="font-size:0.7rem; font-weight:800; color:var(--soft-slate);">COMPLETED JOBS</p></div>
        </div>

        <div id="activeJobSection" style="display: none; margin-top: 40px; padding: 40px; background: #f8fafc; border-radius: 30px; border: 2px dashed #cbd5e1;">
            <p style="color: var(--brand-blue); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px;">Service Workflow</p>
            <div id="activeJobDetails"></div>
            <hr style="margin:25px 0; border:0; border-top:1px solid #e2e8f0;">
            
            <div id="terminalControls">
                <button id="arriveBtn" onclick="markArrival()" class="btn-accept" style="width: 100%; background: var(--sidebar-bg);">
                    I Have Arrived at Spot
                </button>

                <div id="otpVerificationArea">
                    <p style="font-weight: 700; color: var(--text-slate); margin-bottom: 10px;">Ask Driver for the OTP shown on their screen:</p>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="otpInput" placeholder="4-digit code" maxlength="4" style="flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; font-weight: 700; text-align: center; font-size: 1.2rem;">
                        <button onclick="verifyDriverOTP()" class="btn-accept" style="background: var(--brand-blue);">Verify OTP</button>
                    </div>
                </div>

                <div id="workInProgressArea">
                    <div style="background: #ecfdf5; padding: 20px; border-radius: 15px; border: 1px solid #10b981; margin-bottom: 15px;">
                        <p style="color: #065f46; font-weight: 800; margin: 0;">WORK IN PROGRESS</p>
                        <p style="font-size: 0.8rem; color: #065f46; margin: 5px 0 0 0;">Perform the mechanical service now.</p>
                    </div>
                    <button onclick="finishServiceAndBill()" class="btn-accept" style="width: 100%; background: #10b981;">
                        Work Completed (Request Payment)
                    </button>
                </div>
            </div>
        </div>

        <div id="availableJobsSection">
            <h2 style="font-size:1.1rem; font-weight:800; color:var(--soft-slate); margin-top:50px; text-transform: uppercase; letter-spacing: 1px;">Live Fleet Requests</h2>
            <div id="jobContainer"><p>Scanning for nearby requests...</p></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load Partner Profile
            const sessionData = JSON.parse(localStorage.getItem('active_partner'));
            if (sessionData) {
                document.getElementById('partnerNameDisplay').innerText = `Welcome, ${sessionData.name}`;
                document.getElementById('partnerEmailDisplay').innerText = sessionData.email;
                document.getElementById('typeBadge').innerText = sessionData.type;
            }

            // Sync with existing active job
            syncUI();
            setInterval(syncUI, 2000); // Keep in sync if driver cancels or pays
        });

        function syncUI() {
            const currentJob = localStorage.getItem('active_job_status');
            if (currentJob) {
                const job = JSON.parse(currentJob);
                renderJobTerminal(job);
            } else {
                document.getElementById('availableJobsSection').style.display = 'block';
                document.getElementById('activeJobSection').style.display = 'none';
                loadAvailableJobs();
            }
        }

        function loadAvailableJobs() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            const container = document.getElementById('jobContainer');
            // Show jobs that aren't already completed/accepted by others
            container.innerHTML = logs.length ? "" : "<p>No active requests.</p>";

            logs.forEach((job, index) => {
                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <div>
                        <h3>${job.service}</h3>
                        <p style="color:var(--brand-blue); font-weight:800;">${job.price}</p>
                    </div>
                    <button class="btn-accept" onclick="acceptJob('${job.service}', '${job.price}', ${index})">Accept</button>
                `;
                container.appendChild(card);
            });
        }

        function acceptJob(service, price, index) {
            const partner = JSON.parse(localStorage.getItem('active_partner'));
            const jobData = { 
                status: 'accepted', 
                partnerName: partner.name, 
                service, 
                price 
            };
            
            // Remove from list and set as active
            let logs = JSON.parse(localStorage.getItem('fleet_logs'));
            logs.splice(index, 1);
            localStorage.setItem('fleet_logs', JSON.stringify(logs));
            localStorage.setItem('active_job_status', JSON.stringify(jobData));
            
            syncUI();
        }

        function renderJobTerminal(job) {
            document.getElementById('availableJobsSection').style.display = 'none';
            document.getElementById('activeJobSection').style.display = 'block';
            document.getElementById('activeJobDetails').innerHTML = `
                <h2 style="margin:0;">${job.service}</h2>
                <p>Status: <b style="color:var(--brand-blue)">${job.status.toUpperCase()}</b></p>
            `;

            // Control Visibility based on Status
            const arriveBtn = document.getElementById('arriveBtn');
            const otpArea = document.getElementById('otpVerificationArea');
            const workArea = document.getElementById('workInProgressArea');

            if (job.status === 'accepted') {
                arriveBtn.style.display = 'block';
                otpArea.style.display = 'none';
                workArea.style.display = 'none';
            } 
            else if (job.status === 'arrived') {
                arriveBtn.style.display = 'none';
                otpArea.style.display = 'block';
                workArea.style.display = 'none';
            } 
            else if (job.status === 'in_progress') {
                arriveBtn.style.display = 'none';
                otpArea.style.display = 'none';
                workArea.style.display = 'block';
            }
        }

        // --- CORE LOGIC STEPS ---

        function markArrival() {
            // 1. Generate OTP and store it
            const otp = Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('active_otp', otp);

            // 2. Update status to 'arrived'. Driver Dashboard will see this and show the OTP.
            let job = JSON.parse(localStorage.getItem('active_job_status'));
            job.status = 'arrived';
            localStorage.setItem('active_job_status', JSON.stringify(job));
            
            syncUI();
        }

        function verifyDriverOTP() {
            const entered = document.getElementById('otpInput').value;
            const actual = localStorage.getItem('active_otp');

            if (entered === actual) {
                let job = JSON.parse(localStorage.getItem('active_job_status'));
                job.status = 'in_progress';
                localStorage.setItem('active_job_status', JSON.stringify(job));
                alert("Identity Verified! You may start working.");
                syncUI();
            } else {
                alert("Incorrect OTP. Please ask the driver to read the code on their screen.");
            }
        }

        function finishServiceAndBill() {
            let job = JSON.parse(localStorage.getItem('active_job_status'));
            // This triggers the "Pay Now" button on the Driver's side
            job.status = 'awaiting_payment';
            localStorage.setItem('active_job_status', JSON.stringify(job));
            
            alert("Work Completed. Waiting for Driver's payment.");
            
            // Optional: The partner can stay on this screen or clear it to take new jobs
            // Usually, we wait for payment before clearing.
        }

        function logout() {
            localStorage.removeItem('active_partner');
            window.location.href = 'partner_terminal.html';
        }
    </script>
</body>
</html>
