<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Command | MechRoute</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #2563eb; --sidebar-bg: #0f172a; --text-slate: #0f172a; --soft-slate: #64748b; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 40px 24px; justify-content: space-between; }
        .nav-link { display:block; color:#94a3b8; text-decoration:none; margin-bottom:20px; font-weight:700; }
        .nav-link.active { color: white; }
        .main-content { flex-grow: 1; padding: 60px 80px; overflow-y: auto; background: #fff; }
        .welcome-text { font-size: 2.4rem; font-weight: 800; color: var(--text-slate); margin: 0; }
        .partner-type-badge { font-size: 0.7rem; font-weight: 800; color: white; background: var(--brand-blue); padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .job-card { background: white; border: 1px solid #f1f5f9; padding: 25px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-accept { background: var(--text-slate); color: white; padding: 14px 28px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
        .stats-row { display: flex; gap: 20px; margin-top: 20px; }
        .stat-box { flex: 1; padding: 25px; border-radius: 20px; border: 1px solid #f1f5f9; }
        .btn-logout { background: var(--brand-blue); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div>
            <div style="font-size: 1.5rem; font-weight: 800;">MechRoute<span style="color:var(--brand-blue)">.Partner</span></div>
            <nav style="margin-top: 60px;">
                <a href="#" class="nav-link active">Job Terminal</a>
                <a href="#" class="nav-link">Earnings</a>
            </nav>
        </div>
        <button onclick="logout()" class="btn-logout">Logout Terminal</button>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="partnerNameDisplay" class="welcome-text">Welcome, Partner</h1>
            <div style="margin-top: 12px;">
                <span id="typeBadge" class="partner-type-badge">Expert</span>
                <span id="partnerEmailDisplay" style="margin-left:10px; font-weight:600; color:var(--soft-slate);">Loading email...</span>
            </div>
        </header>

        <div class="stats-row">
            <div class="stat-box"><h2>₹0</h2><p>TODAY'S EARNINGS</p></div>
            <div class="stat-box"><h2>0</h2><p>COMPLETED JOBS</p></div>
        </div>

        <div id="activeJobSection" style="display: none; margin-top: 40px; padding: 30px; background: #f8fafc; border-radius: 24px; border: 2px dashed #cbd5e1;">
            <h2 style="font-size:1.1rem; font-weight:800; color:var(--soft-slate); text-transform:uppercase;">Active Job</h2>
            <div id="activeJobDetails"></div>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <button onclick="generateServiceOTP()" class="btn-accept" style="width:100%; margin-bottom:10px;">Arrived at Spot (Gen OTP)</button>
            <div style="display:flex; gap:10px;">
                <input type="text" id="otpInput" placeholder="4-digit OTP" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd; text-align:center; font-weight:bold;">
                <button onclick="verifyOTP()" class="btn-accept" style="background:var(--brand-blue)">Verify</button>
            </div>
        </div>

        <div id="availableJobsSection">
            <h2 style="font-size:1.1rem; font-weight:800; color:var(--soft-slate); margin-top:40px;">Live Fleet Requests</h2>
            <div id="jobContainer"><p>Scanning for requests...</p></div>
        </div>
    </main>

    <script src="../assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sessionData = JSON.parse(localStorage.getItem('active_partner'));
            if (sessionData) {
                document.getElementById('partnerNameDisplay').innerText = `Welcome, ${sessionData.name}`;
                document.getElementById('partnerEmailDisplay').innerText = sessionData.email;
                document.getElementById('typeBadge').innerText = sessionData.type;
            }

            const currentJob = localStorage.getItem('active_job_status');
            if (currentJob) {
                showServiceTerminal(JSON.parse(currentJob));
            } else {
                loadAvailableJobs();
            }
        });

        function loadAvailableJobs() {
            const logs = JSON.parse(localStorage.getItem('fleet_logs')) || [];
            const container = document.getElementById('jobContainer');
            container.innerHTML = logs.length ? "" : "<p>No requests nearby.</p>";

            logs.reverse().forEach((job, index) => {
                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <div><h3>${job.service}</h3><p>${job.price}</p></div>
                    <button class="btn-accept" onclick="acceptJobProcess('${job.service}', '${job.price}')">Accept</button>
                `;
                container.appendChild(card);
            });
        }

        function acceptJobProcess(service, price) {
            const partnerName = document.getElementById('partnerNameDisplay').innerText.replace('Welcome, ', '');
            const jobUpdate = { status: 'accepted', partnerName, service, price };
            localStorage.setItem('active_job_status', JSON.stringify(jobUpdate));
            showServiceTerminal(jobUpdate);
        }

        function showServiceTerminal(job) {
            document.getElementById('availableJobsSection').style.display = 'none';
            document.getElementById('activeJobSection').style.display = 'block';
            document.getElementById('activeJobDetails').innerHTML = `<h3>${job.service}</h3><p>${job.price}</p>`;
        }

        function logout() {
            localStorage.removeItem('active_partner');
            window.location.href = 'partner_terminal.html';
        }
    </script>
</body>
</html>
